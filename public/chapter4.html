<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICT MUTU Study</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Theme Palette */
            --bg-grad-1: #f8fafc;
            --bg-grad-2: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --solid-bg: #ffffff;
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --accent: #f43f5e;
            --success: #10b981;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.04);
            --shadow-inner: inset 0 2px 4px rgba(255,255,255,0.5);
        }
        
        [data-theme="dark"] {
            /* Dark Theme Palette (OLED optimized) */
            --bg-grad-1: #020617;
            --bg-grad-2: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --solid-bg: #1e293b;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.15);
            --accent: #fb7185;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-inner: inset 0 1px 1px rgba(255,255,255,0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', 'Hind Siliguri', sans-serif; 
            color: var(--text-main); line-height: 1.7; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed; min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* --- Progress Bar --- */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 2000; background: transparent; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.3s ease-out; box-shadow: 0 0 10px var(--primary-glow); }

        /* --- Premium Navbar --- */
        nav {
            position: sticky; top: 12px; margin: 0 12px 20px; padding: 12px 16px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            box-shadow: var(--shadow-soft), var(--shadow-inner);
        }
        
        .nav-brand { font-weight: 800; font-size: 1.2rem; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;}
        
        /* Stats & Icons */
        .nav-actions { display: flex; align-items: center; gap: 8px; }
        
        .stats-badge { 
            display: flex; align-items: center; gap: 6px; background: var(--solid-bg); 
            padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; 
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); color: var(--text-main);
        }
        .stats-badge svg { width: 14px; height: 14px; color: var(--primary); }

        .icon-btn { 
            background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); 
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; box-shadow: var(--shadow-soft); transition: all 0.2s;
        }
        .icon-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .icon-btn:active { transform: scale(0.9); background: var(--primary-glow); color: var(--primary); }

        .container { max-width: 800px; margin: 0 auto; padding: 0 16px 80px; }

        /* --- Hero --- */
        .hero { text-align: center; padding: 20px 0 30px; }
        .hero h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; color: var(--text-main); letter-spacing: -0.5px;}
        .hero p { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }

        /* --- Tabs (Optimized for speed) --- */
        .tabs-container {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 6px; border-radius: 20px; border: 1px solid var(--glass-border);
            display: flex; overflow-x: auto; margin-bottom: 24px; box-shadow: var(--shadow-soft);
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1; min-width: max-content; background: transparent; border: none;
            padding: 12px 16px; border-radius: 14px; font-size: 0.9rem; font-weight: 600;
            color: var(--text-muted); cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: var(--solid-bg); color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }

        /* --- MCQ Cards --- */
        .mcq-list { display: flex; flex-direction: column; gap: 20px; }
        
        .mcq-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; 
            box-shadow: var(--shadow-soft); transition: border-color 0.3s;
        }
        .mcq-card.completed { border-color: var(--success); }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .q-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 12px; background: var(--primary-glow); color: var(--primary); border-radius: 100px; }
        .tag { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); border: 1px solid var(--glass-border); padding: 3px 10px; border-radius: 100px; }

        .question { font-size: 1.15rem; font-weight: 600; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; }
        
        .options-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .opt-item { 
            padding: 14px 18px; border: 1px solid var(--glass-border); border-radius: 16px; 
            font-size: 0.95rem; font-weight: 500; background: var(--solid-bg); color: var(--text-muted); 
            display: flex; align-items: center; gap: 12px;
        }

        .ans-reveal { 
            background: var(--solid-bg); border-radius: 16px; padding: 16px; margin-bottom: 20px;
            border-left: 4px solid var(--primary); display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .ans-reveal span { font-size: 1rem; font-weight: 600; color: var(--primary); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn { 
            padding: 12px; border-radius: 14px; font-size: 0.9rem; font-weight: 600; 
            cursor: pointer; transition: transform 0.1s, background 0.3s; border: none;
        }
        .btn-secondary { background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); }
        .btn-primary { background: var(--text-main); color: var(--bg-grad-1); }
        
        .mcq-card.completed .btn-primary { background: var(--success); color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn:active { transform: scale(0.96); }

        .explanation { 
            display: none; grid-column: 1 / -1; background: var(--solid-bg); padding: 16px; 
            border-radius: 16px; font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; border: 1px solid var(--glass-border);
        }
        .explanation.show { display: block; }
        .expl-title { font-weight: 600; margin-bottom: 4px; display: block; }
        .logic-text { color: var(--primary); }
        .trick-text { color: var(--accent); }

        code { font-family: 'Fira Code', monospace; background: var(--primary-glow); color: var(--primary); padding: 2px 6px; border-radius: 6px; font-size: 0.85rem;}
    </style>
</head>

        const CONFIG = {
            title: "অধ্যায় ৪: ওয়েব ডিজাইন ও HTML", 
            subtitle: "৬০টি ইউনিক প্রশ্ন (বোর্ড, লেকচার ও ফাতাহ মডেল টেস্ট)", 
            storageKey: "ict_pro_ch4", 
            tabs: [{"id":"tab-1","label":"ওয়েব ও ইন্টারনেট"},{"id":"tab-2","label":"HTML ট্যাগ ও সিনট্যাক্স"},{"id":"tab-3","label":"টেবিল, লিস্ট ও লিংক"}]
        };

        const dataset = [{"category":"tab-1","id":"q1","tags":["FS","চ. বো. ১৯"],"q":"ইন্টারনেটের সাথে যুক্ত প্রতিটি কম্পিউটারের একটি নির্দিষ্ট ঠিকানা থাকে, একে কী বলে?","opt":["ক) ডোমেইন নেম","খ) আইপি অ্যাড্রেস (IP Address)","গ) ম্যাক অ্যাড্রেস","ঘ) ওয়েব অ্যাড্রেস"],"ans":"খ) আইপি অ্যাড্রেস (IP Address)","logic":"নেটওয়ার্কে থাকা প্রতিটি ডিভাইসের লজিক্যাল ঠিকানাই হলো IP Address।","trick":"ঠিকানা মানেই Address (IP)।"},{"category":"tab-1","id":"q2","tags":["FS","দি. বো. ১৯"],"q":"IPv4 অ্যাড্রেস কত বিটের হয়ে থাকে?","opt":["ক) ১৬ বিট","খ) ৩২ বিট","গ) ৬৪ বিট","ঘ) ১২৮ বিট"],"ans":"খ) ৩২ বিট","logic":"IPv4 মোট 32 বিটের (৪টি অক্টেট) এবং IPv6 হলো 128 বিটের।","trick":"v4 = 4 x 8 = 32 বিট।"},{"category":"tab-1","id":"q3","tags":["LM"],"q":"আইপি অ্যাড্রেসের ক্যারেক্টার বা অক্ষর ভিত্তিক রূপকে কী বলে?","opt":["ক) ডোমেইন নেম","খ) প্রোটোকল","গ) URL","ঘ) ম্যাক অ্যাড্রেস"],"ans":"ক) ডোমেইন নেম","logic":"মানুষের মনে রাখার সুবিধার্থে আইপি অ্যাড্রেসের বদলে ডোমেইন নেম (যেমন: google.com) ব্যবহার করা হয়।","trick":"অক্ষর দিয়ে নাম (Name) হয়।"},{"category":"tab-1","id":"q4","tags":["FS","রা. বো. ২৩"],"q":"ওয়েবসাইট তৈরি করার পর ইন্টারনেটে প্রকাশ করার প্রক্রিয়াকে কী বলে?","opt":["ক) ওয়েব হোস্টিং","খ) ডোমেইন রেজিস্ট্রেশন","গ) ওয়েব পাবলিশিং","ঘ) সার্ভার মেইনটেন্যান্স"],"ans":"ক) ওয়েব হোস্টিং","logic":"ইন্টারনেটে সার্বক্ষণিক যুক্ত কোনো সার্ভারে ওয়েবসাইটের ফাইলগুলো জমা রাখাকে হোস্টিং বলে।","trick":"ফাইল রাখা মানে Host করা।"},{"category":"tab-1","id":"q5","tags":["FM","ব. বো. ১৯"],"q":"WWW এর পূর্ণরূপ কী?","opt":["ক) World Wide Web","খ) World Web Wide","গ) Web Wide World","ঘ) World Wide Weapon"],"ans":"ক) World Wide Web","logic":"WWW হলো ইন্টারনেটে ছড়িয়ে থাকা বিশ্বব্যাপী ওয়েবসাইটের জাল।","trick":"World দিয়ে শুরু, Web দিয়ে শেষ।"},{"category":"tab-1","id":"q6","tags":["LM","FS"],"q":"কোন প্রোটোকলটি ইন্টারনেটে ডেটা আদান-প্রদানের জন্য সবচেয়ে বেশি ব্যবহৃত হয়?","opt":["ক) FTP","খ) HTTP","গ) SMTP","ঘ) TCP/IP"],"ans":"খ) HTTP","logic":"Hypertext Transfer Protocol (HTTP) ব্যবহার করে ওয়েব সার্ভার থেকে ব্রাউজা 1&gt;</code>","গ) <code>&lt;head&gt;</code>","ঘ) <code>&lt;title&gt;</code>"],"ans":"খ) <code>&lt;h1&gt;</code>","logic":"HTML এ হেডিং ট্যাগ ৬টি (h1 থেকে h6)। এর মধ্যে <code>&lt;h1&gt;</code> সবচেয়ে বড় এবং <code>&lt;h6&gt;</code> সবচেয়ে ছোট।","trick":"১ নম্বর সবসময় বড় হয়!"},{"category":"tab-2","id":"q24","tags":["LM","FS"],"q":"নতুন লাইন তৈরি করতে কোন ট্যাগ ব্যবহৃত হয়?","opt":["ক) <code>&lt;break&gt;</code>","খ) <code>&lt;nl&gt;</code>","গ) <code>&lt;br&gt;</code>","ঘ) <code>&lt;hr&gt;</code>"],"ans":"গ) <code>&lt;br&gt;</code>","logic":"Line break এর জন্য <code>&lt;br&gt;</code> একটি এম্পটি ট্যাগ হিসেবে ব্যবহৃত হয়।","trick":"Break এর প্রথম দুই অক্ষর br।"},{"category":"tab-2","id":"q25","tags":["FM","ম. বো. ২৪"],"q":"অনুচ্ছেদ বা প্যারাগ্রাফ তৈরির ট্যাগ কোনটি?","opt":["ক) <code>&lt;para&gt;</code>","খ) <code>&lt;p&gt;</code>","গ) <code>&lt;pr&gt;</code>","ঘ) <code>&lt;paragraph&gt;</code>"],"ans":"খ) <code>&lt;p&gt;</code>","logic":"টেক্সটকে একটি ব্লক বা প্যারাগ্রাফ আকারে দেখাতে <code>&lt;p&gt;</code> ট্যাগ ব্যবহার করা হয়।","trick":"Paragraph এর প্রথম অক্ষর p।"},{"category":"tab-2","id":"q26","tags":["FS","রা. বো. ২৩"],"q":"লেখাকে বোল্ড (গাঢ়) করতে কোন ট্যাগ ব্যবহৃত হয়?","opt":["ক) <code>&lt;bold&gt;</code>","খ) <code>&lt;b&gt;</code>","গ) <code>&lt;strong&gt;</code>","ঘ) খ ও গ উভয়ই"],"ans":"ঘ) খ ও গ উভয়ই","logic":"লেখাকে গাঢ় করার জন্য <code>&lt;b&gt;</code> এবং <code>&lt;strong&gt;</code> দুটি ট্যাগই ব্যবহৃত হয় (তবে strong এর গুরুত্ব বেশি)।","trick":"B তে Bold, Strong মানেও গাঢ়।"},{"category":"tab-2","id":"q27","tags":["LM"],"q":"লেখাকে ইটালিক বা বাঁকা করতে কোন ট্যাগ ব্যবহৃত হয়?","opt":["ক) <code>&lt;i&gt;</code>","খ) <code>&lt;em&gt;</code>","গ) <code>&lt;italic&gt;</code>","ঘ) ক ও খ উভয়ই"],"ans":"ঘ) ক ও খ উভয়ই","logic":"ইটালিক করার জন্য <code>&lt;i&gt;</code> এবং <code>&lt;em&gt;</code> (emphasize) উভয়েই কাজ করে।","trick":"I তে Italic।"},{"category":"tab-2","id":"q28","tags":["FS","ব. বো. ১৯"],"q":"H<sub>2</sub>O লিখতে 2 এর জন্য কোন ট্যাগ ব্যবহার করতে হবে?","opt":["ক) <code>&lt;sup&gt;</code>","খ) <code>&lt;sub&gt;</code>","গ) <code>&lt;down&gt;</code>","ঘ) <code>&lt;bottom&gt;</code>"],"ans":"খ) <code>&lt;sub&gt;</code>","logic":"Subscript (<code>&lt;sub&gt;</code>) ট্যাগ টেক্সটকে স্বাভাবিক লাইনের একটু নিচে লেখে।","trick":"Sub-marine যেমন পানির নিচে থাকে, লেখাও নিচে যায়।"},{"category":"tab-2","id":"q29","tags":["FS","রা. বো. ২৩"],"q":"a<sup>2</sup> + b<sup>2</sup> লিখতে 2 এর জন্য কোন ট্যাগ ব্যবহার করতে হবে?","opt":["ক) <code>&lt;sup&gt;</code>","খ) <code>&lt;sub&gt;</code>","গ) <code>&lt;upper&gt;</code>","ঘ) <code>&lt;top&gt;</code>"],"ans":"ক) <code>&lt;sup&gt;</code>","logic":"Superscript (<code>&lt;sup&gt;</code>) ট্যাগ টেক্সটকে পাওয়ার বা স্কয়ার হিসেবে উপরে লেখে।","trick":"Superman যেমন উপরে ওড়ে, লেখাও উপরে যায়।"},{"category":"tab-2","id":"q30","tags":["LM","FS","FM"],"q":"HTML ডকুমেন্টের মূল অংশ বা কাঠামো কোথায় থাকে?","opt":["ক) <code>&lt;head&gt;</code>","খ) <code>&lt;title&gt;</code>","গ) <code>&lt;body&gt;</code>","ঘ) <code>&lt;main&gt;</code>"],"ans":"গ) <code>&lt;body&gt;</code>","logic":"ব্রাউজারে যা কিছু দেখা যায় (টেক্সট, ছবি, টেবিল) তার সবই <code>&lt;body&gt;</code>...<code>&lt;/body&gt;</code> এর ভেতর লিখতে হয়।","trick":"মানুষের যেমন মূল বডি, ওয়েবসাইটেরও তাই।"},{"category":"tab-2","id":"q31","tags":["FS","সি. বো. ১৯"],"q":"লেখার মাঝে আনুভূমিক রেখা (Horizontal Line) টানার ট্যাগ কোনটি?","opt":["ক) <code>&lt;br&gt;</code>","খ) <code>&lt;hr&gt;</code>","গ) <code>&lt;line&gt;</code>","ঘ) <code>&lt;tr&gt;</code>"],"ans":"খ) <code>&lt;hr&gt;</code>","logic":"Horizontal Rule বা <code>&lt;hr&gt;</code> একটি এম্পটি ট্যাগ যা আড়াআড়ি দাগ টানে।","trick":"Horizontal এর H, Rule এর R।"},{"category":"tab-2","id":"q32","tags":["FS","ব. বো. ১৯"],"q":"লেখার ফন্ট স্টাইল, সাইজ বা কালার পরিবর্তন করতে কোন ট্যাগ ব্যবহৃত হতো (যদিও এখন CSS ব্যবহৃত হয়)?","opt":["ক) <code>&lt;text&gt;</code>","খ) <code>&lt;font&gt;</code>","গ) <code>&lt;style&gt;</code>","ঘ) <code>&lt;format&gt;</code>"],"ans":"খ) <code>&lt;font&gt;</code>","logic":"HTML4 পর্যন্ত <code>&lt;font face=\"...\" color=\"...\" size=\"...\"&gt;</code> ট্যাগটি ডিজাইনের জন্য খুব জনপ্রিয় ছিল।","trick":"ফন্ট বদলাতে ফন্ট ট্যাগ।"},{"category":"tab-2","id":"q33","tags":["LM"],"q":"HTML ট্যাগের বৈশিষ্ট্য নির্ধারণকারী শব্দকে কী বলে?","opt":["ক) প্রপার্টি","খ) ভ্যালু","গ) অ্যাট্রিবিউট (Attribute)","ঘ) এলিমেন্ট"],"ans":"গ) অ্যাট্রিবিউট (Attribute)","logic":"অ্যাট্রিবিউট সবসময় ওপেনিং ট্যাগের ভেতর বসে (যেমন: <code>&lt;img src=\"...\"&gt;</code> এখানে src একটি অ্যাট্রিবিউট)।","trick":"অতিরিক্ত বৈশিষ্ট্য = অ্যাট্রিবিউট।"},{"category":"tab-2","id":"q34","tags":["FS","রা. বো. ২৩"],"q":"ওয়েবপেজে ডিলিট করা বা কাটা দাগ দেওয়া লেখা দেখাতে কোন ট্যাগ ব্যবহৃত হয়?","opt":["ক) <code>&lt;cut&gt;</code>","খ) <code>&lt;strike&gt;</code> বা <code>&lt;del&gt;</code>","গ) <code>&lt;cross&gt;</code>","ঘ) <code>&lt;remove&gt;</code>"],"ans":"খ) <code>&lt;strike&gt;</code> বা <code>&lt;del&gt;</code>","logic":"লেখার মাঝ বরাবর দাগ (strikethrough) টানতে <code>&lt;del&gt;</code> ট্যাগ ব্যবহার করা হয়।","trick":"Delete এর শর্টকাট del।"},{"category":"tab-2","id":"q35","tags":["FM","ম. বো. ২৪"],"q":"ব্রাউজারের ট্যাবে বা টাইটেল বারে ওয়েবসাইটের নাম দেখাতে কোন ট্যাগ ব্যবহৃত হয়?","opt":["ক) <code>&lt;head&gt;</code>","খ) <code>&lt;name&gt;</code>","গ) <code>&lt;title&gt;</code>","ঘ) <code>&lt;h1&gt;</code>"],"ans":"গ) <code>&lt;title&gt;</code>","logic":"<code>&lt;title&gt;</code> ট্যাগটি অবশ্যই <code>&lt;head&gt;</code> সেকশনের ভেতরে লিখতে হয়।","trick":"নাম বা শিরোনাম = Title।"},{"category":"tab-2","id":"q36","tags":["LM","FS"],"q":"HTML কোড লেখার পর ফাইলটি কী এক্সটেনশন দিয়ে সেভ করতে হয়?","opt":["ক) .txt","খ) .html বা .htm","গ) .web","ঘ) .css"],"ans":"খ) .html বা .htm","logic":"ব্রাউজারকে এটি যে একটি ওয়েবপেজ তা বোঝাতে .html বা .htm এক্সটেনশন ব্যবহার বাধ্যতামূলক।","trick":"HTML ফাইল তাই ডট এইচটিএমএল।"},{"category":"tab-2","id":"q37","tags":["FS","ঢা. বো. ২৩"],"q":"সঠিক HTML স্ট্রাকচার কোনটি?","opt":["ক) html > head > body","খ) html > title > body","গ) html > (head > title) + body","ঘ) head > body > html"],"ans":"গ) html > (head > title) + body","logic":"সবচেয়ে বাইরে <code>&lt;html&gt;</code>, তার ভেতর <code>&lt;head&gt;</code> (যার ভেতর <code>&lt;title&gt;</code>) এবং নিচে <code>&lt;body&gt;</code> থাকে।","trick":"মাথা (head) উপরে, শরীর (body) নিচে।"},{"category":"tab-3","id":"q38","tags":["FS","ঢা. বো. ২৩"],"q":"ওয়েবপেজে ছবি যুক্ত করার ট্যাগ কোনটি?","opt":["ক) <code>&lt;image&gt;</code>","খ) <code>&lt;pic&gt;</code>","গ) <code>&lt;img&gt;</code>","ঘ) <code>&lt;photo&gt;</code>"],"ans":"গ) <code>&lt;img&gt;</code>","logic":"<code>&lt;img&gt;</code> একটি এম্পটি ট্যাগ, যা ছবি প্রদর্শনের জন্য ব্যবহৃত হয়।","trick":"Image এর শর্টকাট img।"},{"category":"tab-3","id":"q39","tags":["LM"],"q":"<code>&lt;img&gt;</code> ট্যাগের সবচেয়ে অপরিহার্য অ্যাট্রিবিউট কোনটি, যা ছবির লোকেশন বলে দেয়?","opt":["ক) href","খ) src","গ) alt","ঘ) link"],"ans":"খ) src","logic":"Source বা src অ্যাট্রিবিউট ছাড়া ব্রাউজার বুঝবে মোহ ছবিটি কোথা থেকে আনতে হবে।","trick":"ছবির উৎস (Source) = src।"},{"category":"tab-3","id":"q40","tags":["FS","FM","চ. বো. ১৯"],"q":"ছবি কোনো কারণে লোড না হলে এর বদলে টেক্সট দেখাতে কোন অ্যাট্রিবিউট ব্যবহৃত হয়?","opt":["ক) text","খ) title","গ) alt","ঘ) src"],"ans":"গ) alt","logic":"Alternate Text বা alt অ্যাট্রিবিউট ছবির বিকল্প হিসেবে লেখা প্রদর্শন করে।","trick":"বিকল্প = Alternate (alt)।"},{"category":"tab-3","id":"q41","tags":["FS","ব. বো. ১৯"],"q":"এক পেজ থেকে অন্য পেজে যাওয়ার লিংক তৈরি করতে কোন ট্যাগ ব্যবহৃত হয়?","opt":["ক) <code>&lt;link&gt;</code>","খ) <code>&lt;a&gt;</code>","গ) <code>&lt;href&gt;</code>","ঘ) <code>&lt;hyper&gt;</code>"],"ans":"খ) <code>&lt;a&gt;</code>","logic":"অ্যাঙ্কর (Anchor) বা <code>&lt;a&gt;</code> ট্যাগ ব্যবহার করে হাইপারলিংক তৈরি করা হয়।","trick":"Anchor বা নোঙর দিয়ে অন্য পেজ বাঁধা হয়।"},{"category":"tab-3","id":"q42","tags":["LM","FS"],"q":"<code>&lt;a&gt;</code> ট্যাগে লিংকের ঠিকানা বা URL দিতে কোন অ্যাট্রিবিউট ব্যবহৃত হয়?","opt":["ক) src","খ) link","গ) href","ঘ) url"],"ans":"গ) href","logic":"Hypertext Reference (href) অ্যাট্রিবিউটে লিংকের ডেস্টিনেশন ঠিকানা দেওয়া হয় (যেমন: href=\"google.com\")।","trick":"Hypertext Reference = href।"},{"category":"tab-3","id":"q43","tags":["FS","ব. বো. ১৯"],"q":"অর্ডারড লিস্ট (Ordered List) তৈরি করার ট্যাগ কোনটি?","opt":["ক) <code>&lt;ul&gt;</code>","খ) <code>&lt;li&gt;</code>","গ) <code>&lt;ol&gt;</code>","ঘ) <code>&lt;list&gt;</code>"],"ans":"গ) <code>&lt;ol&gt;</code>","logic":"1, 2, 3 বা a, b, c সিরিয়াল দিয়ে লিস্ট বানাতে <code>&lt;ol&gt;</code> ট্যাগ লাগে।","trick":"Ordered List = ol।"},{"category":"tab-3","id":"q44","tags":["FS","সি. বো. ১৯"],"q":"আন-অর্ডারড লিস্ট (Unordered List) তৈরি করার ট্যাগ কোনটি?","opt":["ক) <code>&lt;ul&gt;</code>","খ) <code>&lt;ol&gt;</code>","গ) <code>&lt;li&gt;</code>","ঘ) <code>&lt;dl&gt;</code>"],"ans":"ক) <code>&lt;ul&gt;</code>","logic":"বুলেট (•), স্কয়ার বা সার্কেল দিয়ে সিরিয়াল ছাড়া লিস্ট বানাতে <code>&lt;ul&gt;</code> ট্যাগ লাগে।","trick":"Unordered List = ul।"},{"category":"tab-3","id":"q45","tags":["LM","FM"],"q":"লিস্টের ভেতরের প্রতিটি আইটেম (List Item) বোঝাতে কোন ট্যাগ ব্যবহৃত হয়?","opt":["ক) <code>&lt;item&gt;</code>","খ) <code>&lt;li&gt;</code>","গ) <code>&lt;ul&gt;</code>","ঘ) <code>&lt;ol&gt;</code>"],"ans":"খ) <code>&lt;li&gt;</code>","logic":"ol বা ul উভয়ের ভেতরেই ডেটা রাখার জন্য <code>&lt;li&gt;</code> ট্যাগ ব্যবহার করা বাধ্যতামূলক।","trick":"List Item = li।"},{"category":"tab-3","id":"q46","tags":["FS","ব. বো. ১৯"],"q":"<code>&lt;ol type=\"A\"&gt;</code> দিলে লিস্টের সিরিয়াল কেমন হবে?","opt":["ক) 1, 2, 3...","খ) a, b, c...","গ) A, B, C...","ঘ) I, II, III..."],"ans":"গ) A, B, C...","logic":"type অ্যাট্রিবিউটে ক্যাপিটাল A দিলে বড় হাতের অক্ষরের সিরিয়াল তৈরি হয়।","trick":"যেমন ইনপুট, তেমন আউটপুট।"},{"category":"tab-3","id":"q47","tags":["FS","চ. বো. ১৯"],"q":"<code>&lt;ul type=\"square\"&gt;</code> দিলে লিস্টের আইটেমগুলোর সামনে কী দেখাবে?","opt":["ক) গোল ভরাট বুলেট","খ) চারকোনা বাক্স","গ) গোল ফাঁকা সার্কেল","ঘ) ১, ২, ৩"],"ans":"খ) চারকোনা বাক্স","logic":"square দিলে চারকোনা বাক্স, circle দিলে ফাঁকা গোল এব :"<code>&lt;table border=\"1\"&gt;</code> না দিলে টেবিলের কোনো দাগ ব্রাউজারে দেখা যায় না।","trick":"দাগ মানেই Border।"},{"category":"tab-3","id":"q53","tags":["FS","কু. বো. ২৩"],"q":"পাশাপাশি দুটি কলাম বা সেলকে একত্রিত (Merge) করতে কোন অ্যাট্রিবিউট ব্যবহৃত হয়?","opt":["ক) rowspan","খ) colspan","গ) merge","ঘ) cellmerge"],"ans":"খ) colspan","logic":"Colspan (Column Span) একাধিক কলামকে এক করে দেয় (ডান-বামে প্রসারিত হয়)।","trick":"কলাম জোড়া দেওয়া মানে Col-span।"},{"category":"tab-3","id":"q54","tags":["LM","FS"],"q":"ওপর-নিচের দুটি সারি বা Row কে একত্রিত (Merge) করতে কোন অ্যাট্রিবিউট ব্যবহৃত হয়?","opt":["ক) rowspan","খ) colspan","গ) merge","ঘ) rowmerge"],"ans":"ক) rowspan","logic":"Rowspan একাধিক সারিকে এক করে দেয় (ওপর-নিচে প্রসারিত হয়)।","trick":"সারি বা Row জোড়া দেওয়া মানে Row-span।"},{"category":"tab-3","id":"q55","tags":["FM","সি. বো. ১৯"],"q":"টেবিলের সেলের ভেতরের লেখা এবং সেলের সীমানার (বর্ডার) মাঝখানের ফাঁকা জায়গাকে কী বলে?","opt":["ক) cellspacing","খ) cellpadding","গ) margin","ঘ) border-spacing"],"ans":"খ) cellpadding","logic":"Cellpadding হলো সেলের ভেতরের দেয়াল থেকে ডেটার দূরত্ব।","trick":"ভেতরের ফাঁকা জায়গা = Padding।"},{"category":"tab-3","id":"q56","tags":["FS","ম. বো. ২৪"],"q":"টেবিলের দুটি সেলের (Cell) মাঝখানের বাইরের ফাঁকা জায়গাকে কী বলে?","opt":["ক) cellspacing","খ) cellpadding","গ) margin","ঘ) spacing"],"ans":"ক) cellspacing","logic":"Cellspacing হলো পাশাপাশি বা উপর-নিচে থাকা দুটি আলাদা সেলের মধ্যকার দূরত্ব।","trick":"দুটি সেলের স্পেস = Cellspacing।"},{"category":"tab-3","id":"q57","tags":["LM"],"q":"ইমেজকে লিংক হিসেবে ব্যবহার করতে হলে কোন ট্যাগের ভেতর <code>&lt;img&gt;</code> ট্যাগটি রাখতে হয়?","opt":["ক) <code>&lt;a&gt;</code> ট্যাগের ভেতর","খ) <code>&lt;p&gt;</code> ট্যাগের ভেতর","গ) <code>&lt;href&gt;</code> ট্যাগের ভেতর","ঘ) <code>&lt;li&gt;</code> ট্যাগের ভেতর"],"ans":"ক) <code>&lt;a&gt;</code> ট্যাগের ভেতর","logic":"যেকোনো টেক্সট বা ছবিকে ক্লিকেবল লিংক বানাতে তাকে <code>&lt;a&gt;</code>...<code>&lt;/a&gt;</code> এর মাঝে রাখতে হয়।","trick":"লিংকের বাবা হলো Anchor (a) ট্যাগ।"},{"category":"tab-3","id":"q60","tags":["FS","মডেল টেস্ট ০৫"],"q":"<code>&lt;table&gt;&lt;tr&gt;&lt;td&gt;A&lt;/td&gt;&lt;td&gt;B&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;C&lt;/td&gt;&lt;td&gt;D&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;</code><br>উপরের HTML কোডের আউটপুট কোনটি?","opt":["ক) <table border='1' style='display:inline-table; margin-left:10px;'><tr><td>A</td><td>B</td></tr><tr><td>C</td><td>D</td></tr></table>","খ) <table border='1' style='display:inline-table; margin-left:10px;'><tr><td>A</td><td>C</td></tr><tr><td>B</td><td>D</td></tr></table>","গ) A B C D (এক লাইনে)","ঘ) A B<br>C D (বর্ডার ছাড়া 2x2 গ্রিড)"],"ans":"ঘ) A B<br>C D (বর্ডার ছাড়া 2x2 গ্রিড)","logic":"কোডে <code>border</code> অ্যাট্রিবিউট ব্যবহার করা হয়নি, তাই ডেটাগুলো 2x2 সারি ও কলাম আকারে বসবে ঠিকই, কিন্তু কোনো দাগ বা বর্ডার দেখা যাবে না।","trick":"Border না থাকলে দাগ দেখা যায় না。"}];

        // ==========================================
        // ⚙️ ZERO-LAG CORE LOGIC
        // ==========================================

        document.getElementById('pageTitle').textContent = CONFIG.title;
        document.getElementById('pageSubtitle').textContent = CONFIG.subtitle;
        document.getElementById('totalCount').textContent = dataset.length;

        let trackingList = JSON.parse(localStorage.getItem(CONFIG.storageKey)) || [];

        // 1. Setup Tabs
        const tabContainer = document.getElementById('tabContainer');
        CONFIG.tabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.textContent = tab.label;
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderMCQs(tab.id); // Triggers lag-free render
            };
            tabContainer.appendChild(btn);
        });

        // 2. Optimized Rendering (Zero Lag for 300+ items)
        function renderMCQs(tabId) {
            const container = document.getElementById('mcqContainer');
            container.innerHTML = ''; // Clear current view
            
            // DocumentFragment prevents multiple reflows/lags
            const fragment = document.createDocumentFragment();
            const filteredData = dataset.filter(q => q.category === tabId);
            
            filteredData.forEach((item, index) => {
                const isChecked = trackingList.includes(item.id);
                const card = document.createElement('div');
                card.className = 'mcq-card ' + (isChecked ? 'completed' : '');
                
                let tagsHtml = item.tags ? item.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
                let optsHtml = item.opt.map(o => `<div class="opt-item">${o}</div>`).join('');
                
                let logicHtml = item.logic ? `<div style="margin-bottom:8px;"><span class="expl-title logic-text">লজিক:</span>${item.logic}</div>` : '';
                let trickHtml = item.trick ? `<div><span class="expl-title trick-text">ট্রিক:</span>${item.trick}</div>` : '';

                card.innerHTML = `
                    <div class="card-top">
                        <span class="q-badge">Q-${item.id.replace('q','').replace('_er','').replace('_1','')}</span>
                        <div>${tagsHtml}</div>
                    </div>
                    <div class="question">${item.q}</div>
                    <div class="options-group">${optsHtml}</div>
                    <div class="ans-reveal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span>${item.ans}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="toggleAnalysis(this)">বিস্তারিত</button>
                        <button class="btn btn-primary" onclick="toggleRead('${item.id}', this, this.closest('.mcq-card'))">
                            ${isChecked ? 'সম্পন্ন' : 'পড়া শেষ'}
                        </button>
                        <div class="explanation">${logicHtml}${trickHtml}</div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            
            container.appendChild(fragment); // Render everything instantly
            updateProgress();
        }

        // Action Handlers
        window.toggleAnalysis = function(btn) {
            const pnl = btn.parentElement.querySelector('.explanation');
            pnl.classList.toggle('show');
            btn.textContent = pnl.classList.contains('show') ? 'লুকান' : 'বিস্তারিত';
        };

        window.toggleRead = function(id, btnElement, cardElement) {
            if (!trackingList.includes(id)) {
                trackingList.push(id);
                cardElement.classList.add('completed');
                btnElement.textContent = 'সম্পন্ন';
            } else {
                trackingList = trackingList.filter(item => item !== id);
                cardElement.classList.remove('completed');
                btnElement.textContent = 'পড়া শেষ';
            }
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(trackingList));
            updateProgress();
        };

        function updateProgress() {
            const percent = dataset.length === 0 ? 0 : (trackingList.length / dataset.length) * 100;
            document.getElementById('barFill').style.width = percent + '%';
            document.getElementById('readCount').textContent = trackingList.length;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('পড়ার রেকর্ড মুছতে চান?')) {
                localStorage.removeItem(CONFIG.storageKey);
                trackingList = [];
                const activeTab = document.querySelector('.tab-btn.active');
                renderMCQs(CONFIG.tabs.find(t => t.label === activeTab.textContent).id);
            }
        });
        
        document.getElementById('chapterNav').addEventListener('change', (e) => {
            if(e.target.value) {
                window.location.href = '/chapter' + e.target.value + '.html';
            }
        });

        // Theme Toggle with Premium SVGs
        const themeBtn = document.getElementById('themeBtn');
        const rootHtml = document.documentElement;
        const savedTheme = localStorage.getItem('ict_theme_mutu') || 'light';
        
        const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;

        const applyTheme = (theme) => {
            rootHtml.setAttribute('data-theme', theme);
            themeBtn.innerHTML = theme === 'light' ? moonIcon : sunIcon;
            localStorage.setItem('ict_theme_mutu', theme);
        };
        applyTheme(savedTheme);

        themeBtn.addEventListener('click', () => {
            const newTheme = rootHtml.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        });

        // Initialize First Tab
        if(CONFIG.tabs.length > 0) renderMCQs(CONFIG.tabs[0].id);

    </script>
</body>
</html>
