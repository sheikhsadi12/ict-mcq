<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICT MUTU Study</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Cinzel:wght@600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Theme Palette */
            --bg-grad-1: #f8fafc;
            --bg-grad-2: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --solid-bg: #ffffff;
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --accent: #f43f5e;
            --success: #10b981;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.04);
            --shadow-inner: inset 0 2px 4px rgba(255,255,255,0.5);
        }
        
        [data-theme="dark"] {
            /* Dark Theme Palette (OLED optimized) */
            --bg-grad-1: #020617;
            --bg-grad-2: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --solid-bg: #1e293b;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.15);
            --accent: #fb7185;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-inner: inset 0 1px 1px rgba(255,255,255,0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', 'Hind Siliguri', sans-serif; 
            color: var(--text-main); line-height: 1.7; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed; min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* --- Progress Bar --- */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 2000; background: transparent; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.3s ease-out; box-shadow: 0 0 10px var(--primary-glow); }

        /* --- Premium Navbar --- */
        nav {
            position: sticky; top: 12px; margin: 0 12px 20px; padding: 12px 16px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            box-shadow: var(--shadow-soft), var(--shadow-inner);
        }
        
        .nav-brand { font-weight: 800; font-size: 1.2rem; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;}
        
        /* Stats & Icons */
        .nav-actions { display: flex; align-items: center; gap: 8px; }
        
        .stats-badge { 
            display: flex; align-items: center; gap: 6px; background: var(--solid-bg); 
            padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; 
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); color: var(--text-main);
        }
        .stats-badge svg { width: 14px; height: 14px; color: var(--primary); }

        .icon-btn { 
            background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); 
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; box-shadow: var(--shadow-soft); transition: all 0.2s;
        }
        .icon-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .icon-btn:active { transform: scale(0.9); background: var(--primary-glow); color: var(--primary); }

        .container { max-width: 800px; margin: 0 auto; padding: 0 16px 80px; }

        /* --- Hero --- */
        .hero { text-align: center; padding: 20px 0 30px; }
        .hero h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; color: var(--text-main); letter-spacing: -0.5px;}
        .hero p { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }

        /* --- Tabs (Optimized for speed) --- */
        .tabs-container {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 6px; border-radius: 20px; border: 1px solid var(--glass-border);
            display: flex; overflow-x: auto; margin-bottom: 24px; box-shadow: var(--shadow-soft);
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1; min-width: max-content; background: transparent; border: none;
            padding: 12px 16px; border-radius: 14px; font-size: 0.9rem; font-weight: 600;
            color: var(--text-muted); cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: var(--solid-bg); color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }

        /* --- MCQ Cards --- */
        .mcq-list { display: flex; flex-direction: column; gap: 20px; }
        
        .mcq-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; 
            box-shadow: var(--shadow-soft); transition: border-color 0.3s;
        }
        .mcq-card.completed { border-color: var(--success); }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .q-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 12px; background: var(--primary-glow); color: var(--primary); border-radius: 100px; }
        .tag { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); border: 1px solid var(--glass-border); padding: 3px 10px; border-radius: 100px; }

        .question { font-size: 1.15rem; font-weight: 600; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; }
        
        .options-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .opt-item { 
            padding: 14px 18px; border: 1px solid var(--glass-border); border-radius: 16px; 
            font-size: 0.95rem; font-weight: 500; background: var(--solid-bg); color: var(--text-muted); 
            display: flex; align-items: center; gap: 12px;
        }

        .ans-reveal { 
            background: var(--solid-bg); border-radius: 16px; padding: 16px; margin-bottom: 20px;
            border-left: 4px solid var(--primary); display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .ans-reveal span { font-size: 1rem; font-weight: 600; color: var(--primary); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn { 
            padding: 12px; border-radius: 14px; font-size: 0.9rem; font-weight: 600; 
            cursor: pointer; transition: transform 0.1s, background 0.3s; border: none;
        }
        .btn-secondary { background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); }
        .btn-primary { background: var(--text-main); color: var(--bg-grad-1); }
        
        .mcq-card.completed .btn-primary { background: var(--success); color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn:active { transform: scale(0.96); }

        .explanation { 
            display: none; grid-column: 1 / -1; background: var(--solid-bg); padding: 16px; 
            border-radius: 16px; font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; border: 1px solid var(--glass-border);
        }
        .explanation.show { display: block; }
        .expl-title { font-weight: 600; margin-bottom: 4px; display: block; }
        .logic-text { color: var(--primary); }
        .trick-text { color: var(--accent); }

        code { font-family: 'Fira Code', monospace; background: var(--primary-glow); color: var(--primary); padding: 2px 6px; border-radius: 6px; font-size: 0.85rem;}
    </style>
</head>

কাজ করা যন্ত্রগুলো রোবটিক্সের অংশ (যেমন ড্রোন বা মার্স রোভার)।","trick":"যে যন্ত্র নিজে চলতে পারে এবং পরিবেশ দেখে কাজ করে, তা রোবট।"},{"category":"tab-1","id":"q15","tags":["FS"],"q":"কামালের যন্ত্রটি (উঁচু-নিচু স্থানে চলাফেরা করা যন্ত্র) ব্যবহার করা যায়- i. চিকিৎসা ক্ষেত্রে ii. গৃহ ব্যবস্থাপনায় iii. শিল্প কারখানায়","opt":["ক) iii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"ঘ) i, ii ও iii","logic":"আধুনিক রোবট বা স্বয়ংক্রিয় যন্ত্রগুলো এখন সার্জারি, স্মার্ট হোম ম্যানেজমেন্ট এবং কারখানায় ভারী পণ্য বহনে ব্যাপকভাবে ব্যবহৃত হয়।","trick":"মানুষের তৈরি এই যন্ত্র সব জগতেই এখন কাজ করে।"},{"category":"tab-1","id":"q16","tags":["FM"],"q":"রোবট ব্যবহৃত হয় যেসব কাজে- i. কলকারখানার জিনিসপত্র পরিবহনে ii. যন্ত্রাংশ সংযোজনে iii. যুদ্ধবাসে ড্রাইভারের বিকল্প হিসেবে","opt":["ক) i ও ii","খ) ii ও iii","গ) i ও iii","ঘ) i, ii ও iii"],"ans":"ঘ) i, ii ও iii","logic":"ম্যানুফ্যাকচারিং, অ্যাসেম্বলিং এবং বিপজ্জনক সামরিক কাজে (Military Drones/Vehicles) রোবট ব্যবহৃত হয়।","trick":"কষ্টকর, সূক্ষ্ম এবং ঝুঁকিপূর্ণ—এই তিন ধরনের কাজেই রোবট অপরিহার্য।"},{"category":"tab-1","id":"q17","tags":["LM","FM"],"q":"পণ্যের থ্রি-ডি ডিজাইন বা নকশা তৈরিতে নিচের কোনটি প্রয়োজন?","opt":["ক) PAT","খ) PLC","গ) NAT","ঘ) CAD"],"ans":"ঘ) CAD","logic":"CAD এর পূর্ণরূপ Computer-Aided Design, যা নিখুঁত ইঞ্জিনিয়ারিং নকশা তৈরিতে ব্যবহৃত সফটওয়্যার।","trick":"নামের ভেতরেই Design (D) লুকিয়ে আছে।"},{"category":"tab-1","id":"q18","tags":["LM","FM"],"q":"ড. রাশেদ এমন একটি যন্ত্র নির্মাণ করলেন যেটি ঝুঁকিপূর্ণ কাজে ব্যবহার করা যায়। গবেষণায় ব্যবহৃত প্রযুক্তিটি কী?","opt":["ক) রোবটিক্স","খ) বায়োমেট্রিক্স","গ) বায়োইনফরমেটিক্স","ঘ) ন্যানোটেকনোলজি"],"ans":"ক) রোবটিক্স","logic":"ঝুঁকিপূর্ণ পরিবেশ যেমন খনি বা পারমাণবিক কেন্দ্রে মানুষের বদলে রোবট ব্যবহার করা নিরাপদ।","trick":"ঝুঁকিপূর্ণ কাজের সমাধান মানেই রোবট।"},{"category":"tab-2","id":"q19","tags":["LM","FM","FS","আ. প. ১৯"],"q":"ব্যক্তি শনাক্তকরণে নিচের কোনটি সর্বাধিক যুক্তিযুক্ত বা নিখুঁত?","opt":["ক) হাতের ছাপ","খ) আঙ্গুলের ছাপ","গ) চোখের রেটিনা স্ক্যান","ঘ) মুখমণ্ডল শনাক্তকরণ"] ,"q":"বিভিন্ন জটিল রোগের কারণ আবিষ্কারে কোন প্রযুক্তি কাজ করছে?","opt":["ক) বায়োইনফরমেটিক্স","খ) ন্যানোটেকনোলজি","গ) জেনেটিক ইঞ্জিনিয়ারিং","ঘ) ক্রায়োসার্জারি"],"ans":"ক) বায়োইনফরমেটিক্স","logic":"জীববিজ্ঞানের ডেটা (যেমন ডিএনএ, প্রোটিন) কম্পিউটারের সাহায্যে বিশ্লেষণ করে জটিল রোগের কারণ বের করা হয় বায়োইনফরমেটিক্স-এ।","trick":"রোগের 'ইনফরমেশন' বা ডেটা নিয়ে কাজ করে বায়োইনফরমেটিক্স।"},{"category":"tab-2","id":"q25","tags":["LM","FM","FS","চ. বো. ১৯"],"q":"জীব সংক্রান্ত তথ্য ব্যবস্থাপনার কাজে কম্পিউটার প্রযুক্তির প্রয়োগ হলো-","opt":["ক) বায়োইনফরমেটিক্স","খ) জেনেটিক ইঞ্জিনিয়ারিং","গ) ক্রায়োসার্জারি","ঘ) বায়োমেট্রিক্স"],"ans":"ক) বায়োইনফরমেটিক্স","logic":"Bio (জীব) + Informatics (তথ্যবিজ্ঞান) = জীববিদ্যার ডেটা নিয়ে কম্পিউটার বিজ্ঞানের সাহায্যে কাজ করা।","trick":"তথ্য ব্যবস্থাপনা মানেই ইনফরমেটিক্স।"},{"category":"tab-2","id":"q26","tags":["FM","FS","চ. বো. ২৩"],"q":"কোনটি বায়োইনফরমেটিক্স পদ্ধতির সফটওয়্যার টুলস হিসাবে ব্যবহৃত হয়?","opt":["ক) SQL","খ) CLISP","গ) PROLOG","ঘ) LISP"],"ans":"ক) SQL","logic":"বায়োইনফরমেটিক্সে বিশাল ডিএনএ ডেটাবেজ ম্যানেজ করতে SQL বা MySQL ডাটাবেজ টুলস ব্যাপকভাবে ব্যবহৃত হয়।","trick":"বিশাল বায়ো-ডেটা রাখতে 'SQL' ডাটাবেজ লাগে।"},{"category":"tab-2","id":"q27","tags":["FS","চ. বো. ২৩"],"q":"কোনটি বায়োইনফরমেটিক্সের উপাদান নয়?","opt":["ক) আর্টিফিশিয়াল ইন্টেলিজেন্স","খ) রসায়ন","গ) প্রোগ্রাম","ঘ) গণিত ও পরিসংখ্যান"],"ans":"ক) আর্টিফিশিয়াল ইন্টেলিজেন্স","logic":"বায়োইনফরমেটিক্স মূলত জীববিদ্যা, গণিত, পরিসংখ্যান, রসায়ন এবং কম্পিউটার প্রোগ্রামিং এর সমন্বিত রূপ। AI এর সরাসরি উপাদান নয়।","trick":"AI নিজে একটা আলাদা দুনিয়া, এটি বায়োইনফরমেটিক্সের মূল উপাদান নয়।"},{"category":"tab-2","id":"q28","tags":["FS","ঢা. বো. ১১"],"q":"বায়োইনফরমেটিক্সের ব্যবহারের ক্ষেত্রগুলি হলো- i. জৈব প্রযুক্তি ii. জীবাণু অস্ত্র তৈরি iii. মহাকাশ গবেষণা","opt":["ক) i ও ii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"ক) i ও ii","logic":"বায়োইনফরমেটিক্স জৈব প্রযুক্তি গবেষণায় এবং অত্যন্ত দুঃখজনক হলেও আধুনিক জীবাণু অস্ত্র (Biological weapons) ডিজাইনে ডেটা বিশ্লেষণে ব্যবহৃত হতে পারে।","trick":"মহাকাশে বায়োইনফরমেটিক্সের সরাসরি কাজ নেই।"},{"category":"tab-2","id":"q29","tags":["FS","ব. বো. ১৯"],"q":"বাংলাদেশ ধান গবেষণা ইনস্টিটিউট গবেষণা করে উপকূলীয় অঞ্চলে চাষযোগ্য নতুন জাতের ধান উদ্ভাবন করেছে। প্রতিষ্ঠানটির সাফল্যে দেশে- i. অর্থনৈতিক উন্নয়ন হবে ii. জীববৈচিত্র্য সৃষ্টির পথ সুগম হবে iii. ধানের দেশীয় প্রজাতি বিলুপ্ত হবে","opt":["ক) i ও ii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"ক) i ও ii","logic":"নতুন জাত উদ্ভাবনে কৃষি অর্থনীতি শক্তিশালী হয় এবং নতুন জাত সৃষ্টির ফলে জীববৈচিত্র্য বাড়ে, দেশীয় প্রজাতি বিলুপ্ত হয় না।","trick":"ইতিবাচক কাজে নেতিবাচক (বিলুপ্ত) ফল আসে না।"},{"category":"tab-2","id":"q30","tags":["FM"],"q":"মানুষকে ইউনিক হিসেবে শনাক্তকরণ প্রযুক্তি হল-","opt":["ক) জেনেটিক ইঞ্জিনিয়ারিং","খ) বায়োমেট্রিক্স","গ) বায়োইনফরমেটিক্স","ঘ) ন্যানো টেকনোলজি"],"ans":"খ) বায়োমেট্রিক্স","logic":"মানুষের অদ্বিতীয় শারীরিক বা আচরণগত বৈশিষ্ট্য মেপে তাকে আলাদাভাবে শনাক্ত করার প্রযুক্তিই হলো বায়োমেট্রিক্স।","trick":"ইউনিক শনাক্তকরণ = বায়োমেট্রিক্স।"},{"category":"tab-2","id":"q31","tags":["FM"],"q":"মোবাইল সিম ক্রয়ে কোন প্রযুক্তি গ্রাহককে সহায়তা করে?","opt":["ক) বায়োমেট্রিক্স","খ) জেনেটিক ইঞ্জিনিয়ারিং","গ) ন্যানো টেকনোলজি","ঘ) ক্রায়োসার্জারি"],"ans":"ক) বায়োমেট্রিক্স","logic":"বর্তমানে মোবাইল সিম কিনতে গ্রাহকের হাতের আঙুলের ছাপ বা বায়োমেট্রিক রেজিস্ট্রেশন বাধ্যতামূলক করা হয়েছে।","trick":"সিম কিনতে আঙুলের ছাপ লাগে, আর আঙুলের ছাপই হলো বায়োমেট্রিক্স।"},{"category":"tab-2","id":"q32","tags":["FM"],"q":"ড. সিরাজ একজন কৃষিবিজ্ঞানী। সে এখন একটি উচ্চফলনশীল পেঁপে উদ্ভাবন করল যার প্রতিটির ওজন প্রায় ১৫ কেজি। ড. সিরাজ এর ব্যবহৃত প্রযুক্তিটির নাম কী?","opt":["ক) বায়োইনফরমেটিক্স","খ) ন্যানোটেকনোলজি","গ) বায়োমেট্রিক্স","ঘ) জেনেটিক ইঞ্জিনিয়ারিং"],"ans":"ঘ) জেনেটিক ইঞ্জিনিয়ারিং","logic":"উচ্চফলনশীল বা বড় আকারের ফল উদ্ভাবনের জন্য উদ্ভিদের জিনের পরিবর্তন ঘটানো হয়, যা জেনেটিক ইঞ্জিনিয়ারিং এর কাজ।","trick":"নতুন জাত বা অস্বাভাবিক বড় ফল = জিনের কারসাজি।"},{"category":"tab-2","id":"q33","tags":["FM"],"q":"উদ্দীপকের আলোকে ড. সিরাজের লক্ষ্য হলো- i. প্রতিকূল পরিবেশে উৎপাদন নিশ্চিত করা ii. রোগ-প্রতিরোধ ক্ষমতা বৃদ্ধি করা iii. উৎপাদনের পরিমাণ বাড়ানো","opt":["ক) i ও ii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"ঘ) i, ii ও iii","logic":"জেনেটিক ইঞ্জিনিয়ারিংয়ের মূল লক্ষ্যই হলো ফসলের উৎপাদন বাড়ানো, রোগ-প্রতিরোধ করা এবং বৈরী আবহাওয়ায় টিকে থাকতে সাহায্য করা।","trick":"কৃষিতে জেনেটিক্সের সব ইতিবাচক ফলই এর লক্ষ্য।"},{"category":"tab-2","id":"q34","tags":["FS","ঢা. বো. ২৪"],"q":"প্রতাপ একটি প্রতিষ্ঠানের একটি কক্ষে আঙ্গুলের ছাপ দিয়ে প্রবেশ করে এবং সেখানে কার ড্রাইভিং প্রশিক্ষণ নেয়। কক্ষে প্রবেশে ব্যবহৃত প্রযুক্তি কোনটি?","opt":["ক) রোবটিক্স","খ) বায়োইনফরমেটিক্স","গ) বায়োমেট্রিক্স","ঘ) ভার্চুয়াল রিয়েলিটি"],"ans":"গ) বায়োমেট্রিক্স","logic":"আঙুলের ছাপ (Fingerprint) দিয়ে ডিজিটাল পদ্ধতিতে কোনো লক বা দরজা খোলার প্রযুক্তি বায়োমেট্রিক্স সিস্টেমের অংশ।","trick":"আঙুলের ছাপ দিয়ে প্রবেশ মানেই বায়োমেট্রিক্স।"},{"category":"tab-2","id":"q35","tags":["LM","FS","আ. প. ২৩"],"q":"বায়োমেট্রিক্স ব্যবহৃত হয়-","opt":["ক) কৃত্রিম বুদ্ধিমত্তায়","খ) ব্যক্তি শনাক্তকরণে","গ) যোগাযোগক্ষেত্রে","ঘ) চিকিৎসাক্ষেত্রে"],"ans":"খ) ব্যক্তি শনাক্তকরণে","logic":"মানুষের অদ্বিতীয় শারীরিক বৈশিষ্ট্য মেপে নিখুঁত পরিচয় নিশ্চিত করার মাধ্যমই বায়োমেট্রিক্স।","trick":"বায়ো (জীবন/মানুষ) + মেট্রিক্স (পরিমাপ) = মানুষের পরিচয় পরিমাপ করা।"},{"category":"tab-2","id":"q36","tags":["LM"],"q":"বিজ্ঞানী মাকসুদুল আলম কোন ক্ষেত্রে বায়োইনফরমেটিক্স ও জেনেটিক্স ব্যবহার করে খ্যাতি অর্জন করেন?","opt":["ক) তোষা পাট","খ) চা পাতা","গ) বালাম ধান","ঘ) ভুট্টা"],"ans":"ক) তোষা পাট","logic":"তিনি পাটের জীবন রহস্য বা জিনোম সিকোয়েন্স উন্মোচনের মাধ্যমে বাংলাদেশের কৃষি গবেষণাকে বিশ্বমঞ্চে নিয়ে যান।","trick":"বাঙালি বিজ্ঞানী ও সোনালী আঁশ পাট একে অপরের পরিপূরক।"},{"category":"tab-2","id":"q37","tags":["LM"],"q":"ড. রাশেদ গবেষণাগারে প্রবেশের জন্য একটি বিশেষ ডিভাইসের দিকে তাকানোর পর দরজা খুলে যায়। এই প্রযুক্তিটির বাস্তব প্রয়োগ ক্ষেত্র কোনটি?","opt":["ক) ই-লার্নিং","খ) পাসপোর্ট ও ভোটার এনরোলমেন্ট","গ) চিকিৎসা ক্ষেত্র","ঘ) মহাকাশ অভিযান"],"ans":"খ) পাসপোর্ট ও ভোটার এনরোলমেন্ট","logic":"চোখ বা রেটিনা স্ক্যানিং হলো বায়োমেট্রিক্সের অংশ, যা জাতীয় পরিচয়পত্র ও আন্তর্জাতিক পাসপোর্টে ব্যবহৃত হয়।","trick":"ব্যক্তি পরিচয় নিশ্চিতকরণের সবচেয়ে বড় সরকারি ক্ষেত্র হলো NID ও পাসপোর্ট।"},{"category":"tab-2","id":"q38","tags":["LM"],"q":"জেনেটিক ইঞ্জিনিয়ারিং ব্যবহারের ক্ষেত্র কোনটি?","opt":["ক) চিকিৎসা","খ) নিরাপত্তা","গ) খেলাধুলা","ঘ) সফ্টওয়্যার"],"ans":"ক) চিকিৎসা","logic":"ইনসুলিন ও বিভিন্ন জীবনরক্ষাকারী ড্রাগ তৈরিতে জিনগত পরিবর্তন বা জেনেটিক ইঞ্জিনিয়ারিং সরাসরি যুক্ত।","trick":"ডিএনএ ও জিন মানেই মানুষের শরীর তথা চিকিৎসার সাথে সম্পর্কিত।"},{"category":"tab-3","id":"q39","tags":["LM","FS","আ. প. ২৩"],"q":"চিপসের প্যাকেটের ভেতরের অংশে অ্যালুমিনিয়ামের অতি পাতলা প্রলেপ উৎপাদনে কোন প্রযুক্তি ব্যবহৃত হয়?","opt":["ক) জেনেটিক ইঞ্জিনিয়ারিং","খ) আর্টিফিসিয়াল ইন্টেলিজেন্স","গ) বায়োইনফরমেটিক্স","ঘ) ন্যানোটেকনোলজি"],"ans":"ঘ) ন্যানোটেকনোলজি","logic":"অণু বা পরমাণু স্তরের অতি ক্ষুদ্র প্রলেপ তৈরির জন্য ন্যানোটেকনোলজি ব্যবহার করা হয়।","trick":"অতি পাতলা বা অণুবীক্ষণিক কোনো বস্তুর আবরণ মানেই ন্যানো প্রযুক্তি।"},{"category":"tab-3","id":"q40","tags":["FS","চ. বো. ১৯"],"q":"মলিকুলার কম্পোনেন্ট থেকে তৈরি অবজেক্ট বা টপ-ডাউন পদ্ধতিতে বস্তু তৈরি করাকে কী বলে?","opt":["ক) বায়োমেট্রিক্স","খ) জেনেটিক ইঞ্জিনিয়ারিং","গ) বায়োইনফরমেটিক্স","ঘ) ন্যানোটেকনোলজি"],"ans":"ঘ) ন্যানোটেকনোলজি","logic":"বড় জিনিসকে কেটে ছোট করে ন্যানো স্কেলে নির্দিষ্ট আকার দেওয়ার পদ্ধতিকে টপ-ডাউন ন্যানোটেকনোলজি বলে।","trick":"বড় থেকে ছোট (টপ থেকে ডাউন) মানেই বস্তুকে ন্যানো বা ক্ষুদ্র করা।"},{"category":"tab-3","id":"q41","tags":["FS","চ. বো. ২৩"],"q":"ন্যানো প্রযুক্তি কয় পদ্ধতিতে ব্যবহৃত হয়?","opt":["ক) ২","খ) ৩","গ) ৪","ঘ) ৫"],"ans":"ক) ২","logic":"ন্যানোটেকনোলজি মূলত দুটি পদ্ধতিতে কাজ করে: টপ-ডাউন (Top-down) এবং বটম-আপ (Bottom-up)।","trick":"উপরে (Top) আর নিচে (Bottom) — এই ২ দিকেই ন্যানো কাজ করে।"},{"category":"tab-3","id":"q42","tags":["FS","রা. বো. ২৪"],"q":"চিকিৎসা ক্ষেত্রে ন্যানোটেকনোলজির ব্যবহার হতে পারে- i. এন্ডোসকপি ii. এক্স-রে iii. কলোনোস্কোপি","opt":["ক) i ও ii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"ঘ) i, ii ও iii","logic":"ন্যান  সংযোগ ব্যবহার করে একাধিক ব্যক্তির লাইভ আলোচনা করাকে ভিডিও কনফারেন্সিং বলে।","trick":"সভা সমাবেশে শুধু শব্দ নয়, চেহারাও দেখতে হয়, তাই ভিডিও কনফারেন্সিং।"}];

        // ==========================================
        // ⚙️ ZERO-LAG CORE LOGIC
        // ==========================================

        document.getElementById('pageTitle').textContent = CONFIG.title;
        document.getElementById('pageSubtitle').textContent = CONFIG.subtitle;
        document.getElementById('totalCount').textContent = dataset.length;

        let trackingList = JSON.parse(localStorage.getItem(CONFIG.storageKey)) || [];

        // 1. Setup Tabs
        const tabContainer = document.getElementById('tabContainer');
        CONFIG.tabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.textContent = tab.label;
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderMCQs(tab.id); // Triggers lag-free render
            };
            tabContainer.appendChild(btn);
        });

        // 2. Optimized Rendering (Zero Lag for 300+ items)
        function renderMCQs(tabId) {
            const container = document.getElementById('mcqContainer');
            container.innerHTML = ''; // Clear current view
            
            // DocumentFragment prevents multiple reflows/lags
            const fragment = document.createDocumentFragment();
            const filteredData = dataset.filter(q => q.category === tabId);
            
            filteredData.forEach((item, index) => {
                const isChecked = trackingList.includes(item.id);
                const card = document.createElement('div');
                card.className = 'mcq-card ' + (isChecked ? 'completed' : '');
                
                let tagsHtml = item.tags ? item.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
                let optsHtml = item.opt.map(o => `<div class="opt-item">${o}</div>`).join('');
                
                let logicHtml = item.logic ? `<div style="margin-bottom:8px;"><span class="expl-title logic-text">লজিক:</span>${item.logic}</div>` : '';
                let trickHtml = item.trick ? `<div><span class="expl-title trick-text">ট্রিক:</span>${item.trick}</div>` : '';

                card.innerHTML = `
                    <div class="card-top">
                        <span class="q-badge">Q-${item.id.replace('q','').replace('_er','').replace('_1','')}</span>
                        <div>${tagsHtml}</div>
                    </div>
                    <div class="question">${item.q}</div>
                    <div class="options-group">${optsHtml}</div>
                    <div class="ans-reveal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span>${item.ans}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="toggleAnalysis(this)">বিস্তারিত</button>
                        <button class="btn btn-primary" onclick="toggleRead('${item.id}', this, this.closest('.mcq-card'))">
                            ${isChecked ? 'সম্পন্ন' : 'পড়া শেষ'}
                        </button>
                        <div class="explanation">${logicHtml}${trickHtml}</div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            
            container.appendChild(fragment); // Render everything instantly
            updateProgress();
        }

        // Action Handlers
        window.toggleAnalysis = function(btn) {
            const pnl = btn.parentElement.querySelector('.explanation');
            pnl.classList.toggle('show');
            btn.textContent = pnl.classList.contains('show') ? 'লুকান' : 'বিস্তারিত';
        };

        window.toggleRead = function(id, btnElement, cardElement) {
            if (!trackingList.includes(id)) {
                trackingList.push(id);
                cardElement.classList.add('completed');
                btnElement.textContent = 'সম্পন্ন';
            } else {
                trackingList = trackingList.filter(item => item !== id);
                cardElement.classList.remove('completed');
                btnElement.textContent = 'পড়া শেষ';
            }
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(trackingList));
            updateProgress();
        };

        function updateProgress() {
            const percent = dataset.length === 0 ? 0 : (trackingList.length / dataset.length) * 100;
            document.getElementById('barFill').style.width = percent + '%';
            document.getElementById('readCount').textContent = trackingList.length;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('পড়ার রেকর্ড মুছতে চান?')) {
                localStorage.removeItem(CONFIG.storageKey);
                trackingList = [];
                const activeTab = document.querySelector('.tab-btn.active');
                renderMCQs(CONFIG.tabs.find(t => t.label === activeTab.textContent).id);
            }
        });
        
        document.getElementById('chapterNav').addEventListener('change', (e) => {
            if(e.target.value) {
                window.location.href = '/chapter' + e.target.value + '.html';
            }
        });

        // Theme Toggle with Premium SVGs
        const themeBtn = document.getElementById('themeBtn');
        const rootHtml = document.documentElement;
        const savedTheme = localStorage.getItem('ict_theme_mutu') || 'light';
        
        const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;

        const applyTheme = (theme) => {
            rootHtml.setAttribute('data-theme', theme);
            themeBtn.innerHTML = theme === 'light' ? moonIcon : sunIcon;
            localStorage.setItem('ict_theme_mutu', theme);
        };
        applyTheme(savedTheme);

        themeBtn.addEventListener('click', () => {
            const newTheme = rootHtml.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        });

        // Initialize First Tab
        if(CONFIG.tabs.length > 0) renderMCQs(CONFIG.tabs[0].id);

    </script>
</body>
</html>
