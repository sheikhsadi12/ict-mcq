<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICT MUTU Study</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Cinzel:wght@600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Theme Palette */
            --bg-grad-1: #f8fafc;
            --bg-grad-2: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --solid-bg: #ffffff;
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --accent: #f43f5e;
            --success: #10b981;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.04);
            --shadow-inner: inset 0 2px 4px rgba(255,255,255,0.5);
        }
        
        [data-theme="dark"] {
            /* Dark Theme Palette (OLED optimized) */
            --bg-grad-1: #020617;
            --bg-grad-2: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --solid-bg: #1e293b;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.15);
            --accent: #fb7185;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-inner: inset 0 1px 1px rgba(255,255,255,0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', 'Hind Siliguri', sans-serif; 
            color: var(--text-main); line-height: 1.7; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed; min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* --- Progress Bar --- */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 2000; background: transparent; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.3s ease-out; box-shadow: 0 0 10px var(--primary-glow); }

        /* --- Premium Navbar --- */
        nav {
            position: sticky; top: 12px; margin: 0 12px 20px; padding: 12px 16px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            box-shadow: var(--shadow-soft), var(--shadow-inner);
        }
        
        .nav-brand { font-weight: 800; font-size: 1.2rem; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;}
        
        /* Stats & Icons */
        .nav-actions { display: flex; align-items: center; gap: 8px; }
        
        .stats-badge { 
            display: flex; align-items: center; gap: 6px; background: var(--solid-bg); 
            padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; 
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); color: var(--text-main);
        }
        .stats-badge svg { width: 14px; height: 14px; color: var(--primary); }

        .icon-btn { 
            background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); 
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; box-shadow: var(--shadow-soft); transition: all 0.2s;
        }
        .icon-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .icon-btn:active { transform: scale(0.9); background: var(--primary-glow); color: var(--primary); }

        .container { max-width: 800px; margin: 0 auto; padding: 0 16px 80px; }

        /* --- Hero --- */
        .hero { text-align: center; padding: 20px 0 30px; }
        .hero h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; color: var(--text-main); letter-spacing: -0.5px;}
        .hero p { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }

        /* --- Tabs (Optimized for speed) --- */
        .tabs-container {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 6px; border-radius: 20px; border: 1px solid var(--glass-border);
            display: flex; overflow-x: auto; margin-bottom: 24px; box-shadow: var(--shadow-soft);
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1; min-width: max-content; background: transparent; border: none;
            padding: 12px 16px; border-radius: 14px; font-size: 0.9rem; font-weight: 600;
            color: var(--text-muted); cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: var(--solid-bg); color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }

        /* --- MCQ Cards --- */
        .mcq-list { display: flex; flex-direction: column; gap: 20px; }
        
        .mcq-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; 
            box-shadow: var(--shadow-soft); transition: border-color 0.3s;
        }
        .mcq-card.completed { border-color: var(--success); }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .q-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 12px; background: var(--primary-glow); color: var(--primary); border-radius: 100px; }
        .tag { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); border: 1px solid var(--glass-border); padding: 3px 10px; border-radius: 100px; }

        .question { font-size: 1.15rem; font-weight: 600; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; }
        
        .options-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .opt-item { 
            padding: 14px 18px; border: 1px solid var(--glass-border); border-radius: 16px; 
            font-size: 0.95rem; font-weight: 500; background: var(--solid-bg); color: var(--text-muted); 
            display: flex; align-items: center; gap: 12px;
        }

        .ans-reveal { 
            background: var(--solid-bg); border-radius: 16px; padding: 16px; margin-bottom: 20px;
            border-left: 4px solid var(--primary); display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .ans-reveal span { font-size: 1rem; font-weight: 600; color: var(--primary); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn { 
            padding: 12px; border-radius: 14px; font-size: 0.9rem; font-weight: 600; 
            cursor: pointer; transition: transform 0.1s, background 0.3s; border: none;
        }
        .btn-secondary { background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); }
        .btn-primary { background: var(--text-main); color: var(--bg-grad-1); }
        
        .mcq-card.completed .btn-primary { background: var(--success); color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn:active { transform: scale(0.96); }

        .explanation { 
            display: none; grid-column: 1 / -1; background: var(--solid-bg); padding: 16px; 
            border-radius: 16px; font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; border: 1px solid var(--glass-border);
        }
        .explanation.show { display: block; }
        .expl-title { font-weight: 600; margin-bottom: 4px; display: block; }
        .logic-text { color: var(--primary); }
        .trick-text { color: var(--accent); }

        code { font-family: 'Fira Code', monospace; background: var(--primary-glow); color: var(--primary); padding: 2px 6px; border-radius: 6px; font-size: 0.85rem;}
    </style>
</head>

        // 1. Setup Tabs
        const tabContainer = document.getElementById('tabContainer');
        CONFIG.tabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.textContent = tab.label;
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderMCQs(tab.id); // Triggers lag-free render
            };
            tabContainer.appendChild(btn);
        });

        // 2. Optimized Rendering (Zero Lag for 300+ items)
        function renderMCQs(tabId) {
            const container = document.getElementById('mcqContainer');
            container.innerHTML = ''; // Clear current view
            
            // DocumentFragment prevents multiple reflows/lags
            const fragment = document.createDocumentFragment();
            const filteredData = dataset.filter(q => q.category === tabId);
            
            filteredData.forEach((item, index) => {
                const isChecked = trackingList.includes(item.id);
                const card = document.createElement('div');
                card.className = 'mcq-card ' + (isChecked ? 'completed' : '');
                
                let tagsHtml = item.tags ? item.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
                let optsHtml = item.opt.map(o => `<div class="opt-item">${o}</div>`).join('');
                
                let logicHtml = item.logic ? `<div style="margin-bottom:8px;"><span class="expl-title logic-text">লজিক:</span>${item.logic}</div>` : '';
                let trickHtml = item.trick ? `<div><span class="expl-title trick-text">ট্রিক:</span>${item.trick}</div>` : '';

                card.innerHTML = `
                    <div class="card-top">
                        <span class="q-badge">Q-${item.id.replace('q','').replace('_er','').replace('_1','')}</span>
                        <div>${tagsHtml}</div>
                    </div>
                    <div class="question">${item.q}</div>
                    <div class="options-group">${optsHtml}</div>
                    <div class="ans-reveal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span>${item.ans}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="toggleAnalysis(this)">বিস্তারিত</button>
                        <button class="btn btn-primary" onclick="toggleRead('${item.id}', this, this.closest('.mcq-card'))">
                            ${isChecked ? 'সম্পন্ন' : 'পড়া শেষ'}
                        </button>
                        <div class="explanation">${logicHtml}${trickHtml}</div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            
            container.appendChild(fragment); // Render everything instantly
            updateProgress();
        }

        // Action Handlers
        window.toggleAnalysis = function(btn) {
            const pnl = btn.parentElement.querySelector('.explanation');
            pnl.classList.toggle('show');
            btn.textContent = pnl.classList.contains('show') ? 'লুকান' : 'বিস্তারিত';
        };

        window.toggleRead = function(id, btnElement, cardElement) {
            if (!trackingList.includes(id)) {
                trackingList.push(id);
                cardElement.classList.add('completed');
                btnElement.textContent = 'সম্পন্ন';
            } else {
                trackingList = trackingList.filter(item => item !== id);
                cardElement.classList.remove('completed');
                btnElement.textContent = 'পড়া শেষ';
            }
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(trackingList));
            updateProgress();
        };

        function updateProgress() {
            const percent = dataset.length === 0 ? 0 : (trackingList.length / dataset.length) * 100;
            document.getElementById('barFill').style.width = percent + '%';
            document.getElementById('readCount').textContent = trackingList.length;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('পড়ার রেকর্ড মুছতে চান?')) {
                localStorage.removeItem(CONFIG.storageKey);
                trackingList = [];
                const activeTab = document.querySelector('.tab-btn.active');
                renderMCQs(CONFIG.tabs.find(t => t.label === activeTab.textContent).id);
            }
        });
        
        document.getElementById('chapterNav').addEventListener('change', (e) => {
            if(e.target.value) {
                window.location.href = '/chapter' + e.target.value + '.html';
            }
        });

        // Theme Toggle with Premium SVGs
        const themeBtn = document.getElementById('themeBtn');
        const rootHtml = document.documentElement;
        const savedTheme = localStorage.getItem('ict_theme_mutu') || 'light';
        
        const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;

        const applyTheme = (theme) => {
            rootHtml.setAttribute('data-theme', theme);
            themeBtn.innerHTML = theme === 'light' ? moonIcon : sunIcon;
            localStorage.setItem('ict_theme_mutu', theme);
        };
        applyTheme(savedTheme);

        themeBtn.addEventListener('click', () => {
            const newTheme = rootHtml.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        });

        // Initialize First Tab
        if(CONFIG.tabs.length > 0) renderMCQs(CONFIG.tabs[0].id);

    </script>
</body>
</html>
