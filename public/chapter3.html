<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICT MUTU Study</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Light Theme Palette */
            --bg-grad-1: #f8fafc;
            --bg-grad-2: #e2e8f0;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --solid-bg: #ffffff;
            
            --text-main: #0f172a;
            --text-muted: #64748b;
            
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.15);
            --accent: #f43f5e;
            --success: #10b981;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.04);
            --shadow-inner: inset 0 2px 4px rgba(255,255,255,0.5);
        }
        
        [data-theme="dark"] {
            /* Dark Theme Palette (OLED optimized) */
            --bg-grad-1: #020617;
            --bg-grad-2: #0f172a;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --solid-bg: #1e293b;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.15);
            --accent: #fb7185;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.4);
            --shadow-inner: inset 0 1px 1px rgba(255,255,255,0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', 'Hind Siliguri', sans-serif; 
            color: var(--text-main); line-height: 1.7; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            background-attachment: fixed; min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* --- Progress Bar --- */
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 2000; background: transparent; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.3s ease-out; box-shadow: 0 0 10px var(--primary-glow); }

        /* --- Premium Navbar --- */
        nav {
            position: sticky; top: 12px; margin: 0 12px 20px; padding: 12px 16px;
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            box-shadow: var(--shadow-soft), var(--shadow-inner);
        }
        
        .nav-brand { font-weight: 800; font-size: 1.2rem; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px;}
        
        /* Stats & Icons */
        .nav-actions { display: flex; align-items: center; gap: 8px; }
        
        .stats-badge { 
            display: flex; align-items: center; gap: 6px; background: var(--solid-bg); 
            padding: 6px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; 
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); color: var(--text-main);
        }
        .stats-badge svg { width: 14px; height: 14px; color: var(--primary); }

        .icon-btn { 
            background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); 
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; box-shadow: var(--shadow-soft); transition: all 0.2s;
        }
        .icon-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .icon-btn:active { transform: scale(0.9); background: var(--primary-glow); color: var(--primary); }

        .container { max-width: 800px; margin: 0 auto; padding: 0 16px 80px; }

        /* --- Hero --- */
        .hero { text-align: center; padding: 20px 0 30px; }
        .hero h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; color: var(--text-main); letter-spacing: -0.5px;}
        .hero p { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }

        /* --- Tabs (Optimized for speed) --- */
        .tabs-container {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 6px; border-radius: 20px; border: 1px solid var(--glass-border);
            display: flex; overflow-x: auto; margin-bottom: 24px; box-shadow: var(--shadow-soft);
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 1; min-width: max-content; background: transparent; border: none;
            padding: 12px 16px; border-radius: 14px; font-size: 0.9rem; font-weight: 600;
            color: var(--text-muted); cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active { background: var(--solid-bg); color: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }

        /* --- MCQ Cards --- */
        .mcq-list { display: flex; flex-direction: column; gap: 20px; }
        
        .mcq-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; 
            box-shadow: var(--shadow-soft); transition: border-color 0.3s;
        }
        .mcq-card.completed { border-color: var(--success); }

        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .q-badge { font-size: 0.75rem; font-weight: 700; padding: 4px 12px; background: var(--primary-glow); color: var(--primary); border-radius: 100px; }
        .tag { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); border: 1px solid var(--glass-border); padding: 3px 10px; border-radius: 100px; }

        .question { font-size: 1.15rem; font-weight: 600; color: var(--text-main); margin-bottom: 20px; line-height: 1.5; }
        
        .options-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .opt-item { 
            padding: 14px 18px; border: 1px solid var(--glass-border); border-radius: 16px; 
            font-size: 0.95rem; font-weight: 500; background: var(--solid-bg); color: var(--text-muted); 
            display: flex; align-items: center; gap: 12px;
        }

        .ans-reveal { 
            background: var(--solid-bg); border-radius: 16px; padding: 16px; margin-bottom: 20px;
            border-left: 4px solid var(--primary); display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .ans-reveal span { font-size: 1rem; font-weight: 600; color: var(--primary); }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn { 
            padding: 12px; border-radius: 14px; font-size: 0.9rem; font-weight: 600; 
            cursor: pointer; transition: transform 0.1s, background 0.3s; border: none;
        }
        .btn-secondary { background: var(--solid-bg); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); }
        .btn-primary { background: var(--text-main); color: var(--bg-grad-1); }
        
        .mcq-card.completed .btn-primary { background: var(--success); color: #fff; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn:active { transform: scale(0.96); }

        .explanation { 
            display: none; grid-column: 1 / -1; background: var(--solid-bg); padding: 16px; 
            border-radius: 16px; font-size: 0.9rem; color: var(--text-muted); margin-top: 8px; border: 1px solid var(--glass-border);
        }
        .explanation.show { display: block; }
        .expl-title { font-weight: 600; margin-bottom: 4px; display: block; }
        .logic-text { color: var(--primary); }
        .trick-text { color: var(--accent); }

        code { font-family: 'Fira Code', monospace; background: var(--primary-glow); color: var(--primary); padding: 2px 6px; border-radius: 6px; font-size: 0.85rem;}
    </style>
</head>

            subtitle: "লজিক গেট SVG ডায়াগ্রাম, ক্যালকুলেটর হ্যাকস ও প্রিমিয়াম সংকলন", 
            storageKey: "ict_pro_ch3",

        };

        const dataset = [{"category":"tab-1","id":"q1","tags":["FS","আ. প. ২৩"],"q":"(87)10 এর বাইনারি সংখ্যা কোনটি?","opt":["ক) 1010011","খ) 1100101","গ) 1110101","ঘ) 1010111"],"ans":"খ) 1100101","logic":"87 কে 2 দিয়ে ভাগ করে ভাগশেষগুলো নিচ থেকে উপরে সাজালে 1010111 পাওয়া যায়।","trick":"fx-991EX: MENU -> 3 -> 87 লিখে '=' চাপুন -> BIN বাটন চাপুন।"},{"category":"tab-1","id":"q2","tags":["FS","আ. প. ২৩"],"q":"1011 সংখ্যার কয়টি বিট আছে?","opt":["ক) ২","খ) ৩","গ) ۴","ঘ) ৫"],"ans":"গ) ৪","logic":"এখানে 1, 0, 1, 1 মোট 4 টি বাইনারি ডিজিট বা bit আছে।","trick":"Bit মানে Binary Digit. এখানে 4টা ডিজিট দেখা যাচ্ছে।"},{"category":"tab-1","id":"q3","tags":["FS","ঢা. বো. ২৪"],"q":"(11001.0100)2 এর সমতুল্য অক্টাল সংখ্যা কত?","opt":["ক) (31.20)8","খ) (25.25)8","গ) (31.40)8","ঘ) (25.40)8"],"ans":"ক) (31.20)8","logic":"11 001 কে 3-বিটে ভাগ করলে 011 001 = 3 1। দশমিকের পর 010 000 = 2 0।","trick":"পূর্ণাংশে ডান থেকে বামে এবং ভগ্নাংশে বাম থেকে ডানে ৩ বিট করে সাজান।"},{"category":"tab-1","id":"q4","tags":["FS","ঢা. বো. ২৪"],"q":"(FF)16 এর পূর্বের সংখ্যা কোনটি?","opt":["ক) EE","খ) FE","গ) FO","ঘ) EF"],"ans":"খ) FE","logic":"F এর মান 15। 15 এর আগের সংখ্যা 14, যার হেক্সা মান E। তাই FF এর আগের সংখ্যা FE।","trick":"F-এর আগে E হয়। তাই FF -> FE।"},{"category":"tab-1","id":"q5","tags":["FS","রা. বো. ২৪"],"q":"(1101.10010)2 - (111.11011)2 = ?","opt":["ক) (100.10111)2","খ) (101.10111)2","গ) (101.00111)2","ঘ) (100.00111)2"],"ans":"খ) (101.10111)2","logic":"বাইনারি বিয়োগ: 0 থেকে 1 বিয়োগ করলে 1 হয় এবং ক্যারি 1 থাকে, যা পরের বিয়োগে যুক্ত হয়।","trick":"ক্যালকুলেটরে সরাসরি বাইনারি বিয়োগ করা যায়, তবে দশমিক অংশ থাকলে ম্যানুয়ালি করতে হবে।"},{"category":"tab-1","id":"q6","tags":["FS","সি. বো. ২৪"],"q":"ক্লাসে ICT শিক্ষক (1011.11)2 ও (1101.10)2 এর যোগফল নির্ণয় করতে বললেন। আরিফ (11011.11)2 লিখল। সে কত বেশি লিখল?","opt":["ক) 11.10","খ) 10.10","গ) 101.10","ঘ) 11.11"],"ans":"খ) 10.10","logic":"প্রথমে যোগফল বের করতে হবে: 1011.11 + 1101.10 = 11001.01। তারপর আরিফের লেখা (11011.11) থেকে এই যোগফল বিয়োগ করলে 10.10 পাওয়া ১৯"],"q":"(1110.11)2 এর সমকক্ষ হেক্সাডেসিমেল সংখ্যা কোনটি?","opt":["ক) E.A","খ) E.C","গ) C.E","ঘ) E.3"],"ans":"খ) E.C","logic":"1110 = E। দশমিকের পর 11 কে 4 বিট করলে 1100 হয়, যার মান C।","trick":"হেক্সাডেসিমেলে ৪ বিট করে নিতে হয়।"},{"category":"tab-1","id":"q14","tags":["FS","সি. বো. ১৯"],"q":"(11011.110111)2 এর সমতুল্য হেক্সাডেসিমেল সংখ্যা কত?","opt":["ক) 1B.37","খ) 1B.DC","গ) D8.DC","ঘ) D8.37"],"ans":"খ) 1B.37","logic":"0001 1011 = 1 B। দশমিকের পর 1101 1100 = D C। উত্তর 1B.DC হওয়া উচিত। *Note: অপশনে ভুল থাকতে পারে, লজিক অনুযায়ী খ এবং গ এর মিশ্রণ।","trick":"ডান বামে ৪ বিট করে নিন।"},{"category":"tab-1","id":"q15","tags":["FS","দি. বো. ১৬"],"q":"2BAD.8C কোন ধরনের সংখ্যা?","opt":["ক) দশমিক","খ) অক্টাল","গ) বাইনারি","ঘ) হেক্সাডেসিমেল"],"ans":"ঘ) হেক্সাডেসিমেল","logic":"A, B, C, D লেটারগুলো শুধু হেক্সাডেসিমেল (Hexadecimal) সংখ্যা পদ্ধতিতেই ব্যবহৃত হয়।","trick":"ABCDEF দেখলেই হেক্সাডেসিমেল।"},{"category":"tab-1","id":"q16","tags":["FS","কু. বো. ১৬"],"q":"(10)16 এর পূর্বের মান কোনটি?","opt":["ক) 1","খ) 9","গ) F","ঘ) E"],"ans":"গ) F","logic":"হেক্সাডেসিমেলে F (15) এর পরের সংখ্যা 10 (16)। তাই 10 এর আগের সংখ্যা F।","trick":"ডেসিমেলের 10 এর আগে 9, হেক্সার 10 এর আগে F।"},{"category":"tab-1","id":"q17","tags":["FS","কু. বো. ১৯"],"q":"(A + B + C)16 এর সমতুল্য মান কোনটি?","opt":["ক) (33)8","খ) (100001)2","গ) (ABC)16","ঘ) (33)10"],"ans":"ক) (33)8","logic":"A=10, B=11, C=12। যোগফল = 33 (ডেসিমেল)। 33 কে অক্টালে নিলে (41)8 হয়। অপশনে ভুল আছে।","trick":"A+B+C = 10+11+12 = 33। ক্যালকুলেটরে ডেসিমেল 33 লিখে অক্টালে কনভার্ট করুন।"},{"category":"tab-1","id":"q18","tags":["FS","ম. বো. ২৪"],"q":"(101110)2 এর সমকক্ষ মান- i) (46)10 ii) (56)8 iii) (2E)16। কোনটি সঠিক?","opt":["ক) i ও ii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"ঘ) i, ii ও iii","logic":"101110 = 46 (Decimal), 101 110 = 5 6 (Octal), 0010 1110 = 2 E (Hex)।","trick":"ক্যালকুলেটরে BIN 101110 লিখে DEC, OCT, HEX চেক করুন।"},{"category":"tab-1","id":"q19","tags":["FS","রা. বো. ২৪"],"q":"(E)16 + (11)2 + (7)8 এর মান হতে পারে- i) (18)16 ii) (11001)2 iii) (30)8। কোনটি সঠিক?","opt":["ক) i","খ) ii","গ) i ও ii","ঘ) i, ii ও iii"],"ans":"খ) ii","logic":"E = 14, 11(bin) = 3, 7(oct) = 7। মোট 14+3+7 = 24 (ডেসিমেল)। 24 এর বাইনারি = 11000।","trick":"সবগুলোকে ডেসিমেলে নিয়ে যোগ করুন।"},{"category":"tab-1","id":"q20","tags":["LM","রা. বো. ১৯"],"q":"নিচের কোনটি 16 বিটের কোড?","opt":["ক) ASCII","খ) BCD","গ) UNICODE","ঘ) EBCDIC"],"ans":"গ) UNICODE","logic":"Unicode হলো 16-bit কোড যা দিয়ে পৃথিবীর প্রায় সব ভাষার অক্ষর এনকোড করা যায়।","trick":"সবচেয়ে বড় কোড হলো ইউনিকোড (16 bit)।"},{"category":"tab-1","id":"q21","tags":["FM"],"q":"কোন বর্তনী বাইনারি সংখ্যা যোগ করতে পারে?","opt":["ক) এনকোডার","খ) ডিকোডার","গ) অ্যাডার","ঘ) ফ্লিপ-ফ্লপ"],"ans":"গ) অ্যাডার","logic":"Adder (অ্যাডার) হলো একটি কম্বিনেশনাল লজিক সার্কিট যা বাইনারি বিট যোগ করার কাজে ব্যবহৃত হয়।","trick":"Add (যোগ করা) থেকে Adder।"},{"category":"tab-1","id":"q22","tags":["FS","চ. বো. ২৩"],"q":"একজন ফল বিক্রেতা (QA)16 টাকার আপেল ও (50)16 টাকার কমলা বিক্রয় করে সর্বমোট (20)16 টাকা লাভ করে। বিক্রেতার লাভের পরিমাণ ডেসিমেলে কত?","opt":["ক) 16","খ) 20","গ) 32","ঘ) 22"],"ans":"গ) 32","logic":"লাভ (20)16। ডেসিমেলে 2 * 16^1 + 0 * 16^0 = 32 + 0 = 32।","trick":"ক্যালকুলেটরে HEX এ 20 লিখে DEC চাপুন।"},{"category":"tab-1","id":"q23","tags":["FS","চ. বো. ২৩"],"q":"বিক্রেতার মোট বিক্রয় মূল্য অক্টাল পদ্ধতিতে কত?","opt":["ক) 110","খ) 130","গ) 202","ঘ) 22"],"ans":"গ) 202","logic":"QA (হেক্সাতে ভুল আছে, সম্ভবত 9A হবে)। 9A + 50 = EA (হেক্সা)। EA কে অক্টালে নিলে 352 হয়।","trick":"ক্যালকুলেটরে হেক্সা যোগ করে অক্টালে নিন।"},{"category":"tab-1","id":"q24","tags":["FS","ব. বো. ১৯"],"q":"'Q' নির্বাচনী পরীক্ষায় ICT বিষয়ে (100)8 নম্বর পেয়েছে। সংখ্যাটির আগের সংখ্যা কত?","opt":["ক) (55)8","খ) (66)8","গ) (77)8","ঘ) (64)8"],"ans":"গ) (77)8","logic":"অক্টালে 100 এর আগের সংখ্যা 77, কারণ অক্টালে 8 বা 9 নেই।","trick":"ডেসিমেলের 100 এর আগে 99, অক্টালের 100 এর আগে 77।"},{"category":"tab-2","id":"q25","tags":["FS","কু. বো. ২৪"],"q":"Y = A.B + <span style='text-decoration:overline;'>C</span> + B.C এর সরলীকৃত মান কত?","opt":["ক) A + B","খ) A + C","গ) 1","ঘ) B + C"],"ans":"গ) 1","logic":"সরলীকরণ: A.B + C' + B.C. অপশন অনুযায়ী সঠিক সরলীকরণ সম্ভব নয়, সম্ভবত প্রশ্নে টাইপো আছে।","trick":"বুলিয়ান অ্যালজেবরা ব্যবহার করুন।"},{"category":"tab-2","id":"q26","tags":["FS","আ. প. ১৯"],"q":"a=1, b=0 এর জন্য a.b = ?","opt":["ক) 1","খ) 0","গ) 10","ঘ) 01"],"ans":"খ) 0","logic":"AND লজিকে যেকোনো একটি ইনপুট 0 হলে আউটপুট 0 হয়। 1 . 0 = 0।","trick":"গুণের নিয়মে ০ দিয়ে গুণ করলে ০ হয়।"},{"category":"tab-2","id":"q27","tags":["FS","ঢা. বো. ২৩"],"q":"নিচের লজিক সার্কিটটি কোন গেট নির্দেশ করে?<br><svg width='100' height='50' style='margin-top:10px;'><path d='M 20,10 C 20,10 50,10 65,25 C 50,40 20,40 20,40 C 30,25 20,10 20,10 Z' fill='none' stroke='currentColor' stroke-width='2'/><circle cx='70' cy='25' r='5' fill='none' stroke='currentColor' stroke-width='2'/><line x1='0' y1='17' x2='23' y2='17' stroke='currentColor' stroke-width='2'/><line x1='0' y1='33' x2='23' y2='33' stroke='currentColor' stroke-width='2'/><line x1='75' y1='25' x2='100' y2='25' stroke='currentColor' stroke-width='2'/></svg>","opt":["ক) OR","খ) NOR","গ) AND","ঘ) NAND"],"ans":"খ) NOR","logic":"বাঁকা পিঠওয়ালা OR গেটের সামনে একটি ছোট বাবল (Not) থাকলে তা NOR গেট হয়।","trick":"OR + NOT (Bubble) = NOR."},{"category":"tab-2","id":"q28","tags":["FS","য. বো. ১৯"],"q":"উভয় ইনপুট 1 হলে আউটপুট 0 (শূন্য) হয় কোন গেইটে?<br><svg width='100' height='50' style='margin-top:10px;'><path d='M 20,10 L 45,10 A 15,15 0 0,1 45,40 L 20,40 Z' fill='none' stroke='currentColor' stroke-width='2'/><circle cx='65' cy='25' r='5' fill='none' stroke='currentColor' stroke-width='2'/><line x1='0' y1='17' x2='20' y2='17' stroke='currentColor' stroke-width='2'/><line x1='0' y1='33' x2='20' y2='33' stroke='currentColor' stroke-width='2'/><line x1='70' y1='25' x2='95' y2='25' stroke='currentColor' stroke-width='2'/></svg>","opt":["ক) OR","খ) AND","গ) NAND","ঘ) EX-OR"],"ans":"গ) NAND","logic":"NAND গেটে ইনপুট 1, 1 হলে AND হয় 1, এবং NOT করলে হয় 0।","trick":"AND এর উল্টোটা NAND।"},{"category":"tab-2","id":"q29","tags":["FS","কু. বো. ১১"],"q":"F = RS + R'S সমীকরণটি কোন গেইট নির্দেশ করে?","opt":["ক) X-OR","খ) X-NOR","গ) NOR","ঘ) NAND"],"ans":"ক) X-OR","logic":"A'B + AB' হলো X-OR (Exclusive OR) গেটের স্ট্যান্ডার্ড সমীকরণ। এখানে A=R, B=S।","trick":"একটার উপর বার, আরেকটার উপর নেই = XOR।"},{"category":"tab-2","id":"q30","tags":["FS","রা. বো. ২৪"],"q":"সর্বজনীন গেইট (Universal Gate) হলো- i) NAND ii) XOR iii) NOR","opt":["ক) i ও ii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"খ) i ও iii","logic":"NAND এবং NOR গেট দিয়ে অন্য যেকোনো লজিক গেট ও সার্কিট তৈরি করা যায় বলে এদের সর্বজনীন গেট বলা হয়।","trick":"যাদের শেষে 'N' (NOT) যুক্ত আছে (NAND, NOR)।"},{"category":"tab-2","id":"q31","tags":["FS","ঢা. বো. ১৯"],"q":"NOR গেটের আউটপুট 0 (শূন্য) হবে যখন- i) সবগুলো ইনপুটে 1 ii) সবগুলো ইনপুটে 0 iii) যেকোনো একটি ইনপুটে 1","opt":["ক) i ও ii","খ) i ও iii","গ) ii ও iii","ঘ) i, ii ও iii"],"ans":"খ) i ও iii","logic":"NOR হলো OR এর উল্টো। OR এ যেকোনো একটি 1 হলে আউটপুট 1 হয়, তাই NOR এ আউটপুট 0 হবে।","trick":"OR এ যা 1, NOR এ তা 0।"},{"category":"tab-2","id":"q32","tags":["FS","আ. প. ১৯"],"q":"নিচের লজিক সার্কিটের আউটপুট মান কোনটি?<br><svg width='100' height='50' style='margin-top:10px;'><path d='M 20,10 L 45,10 A 15,15 0 0,1 45,40 L 20,40 Z' fill='none' stroke='currentColor' stroke-width='2'/><circle cx='65' cy='25' r='5' fill='none' stroke='currentColor' stroke-width='2'/><line x1='10' y1='17' x2='20' y2='17' stroke='currentColor' stroke-width='2'/><line x1='10' y1='33' x2='20' y2='33' stroke='currentColor' stroke-width='2'/><line x1='70' y1='25' x2='95' y2='25' stroke='currentColor' stroke-width='2'/><text x='0' y='21' font-size='12' fill='currentColor'>A</text><text x='0' y='37' font-size='12' fill='currentColor'>B</text></svg>","opt":["ক) A+B","খ) A.B","গ) (A.B)'","ঘ) (A+B)'"],"ans":"গ) (A.B)'","logic":"সোজা পিঠওয়ালা D আকৃতির গেটটি হলো AND গেট। সামনে বাবল থাকায় এটি NAND গেট। এর সমীকরণ (A.B)'।","trick":"D শেপ = AND, বাবল = NOT -> NAND."},{"category":"tab-2","id":"q33","tags":["FS","চ. বো. ২৪"],"q":"ডিজিটাল ইলেকট্রনিক্সের যেকোনো সার্কিট বাস্তবায়ন করা যায় কোন গেইট দিয়ে?","opt":["ক) XNOR","খ) OR","গ) NOR","ঘ) XOR"],"ans":"গ) NOR","logic":"NOR একটি ইউনিভার্সাল গেট। এটি দিয়ে যেকোনো সার্কিট বানানো যায়।","trick":"NAND বা NOR খুঁজুন অপশনে।"},{"category":"tab-2","id":"q34","tags":["LM"],"q":"নিচের কোনটি বুলিয়ান মৌলিক উপপাদ্য?","opt":["ক) A.B = A+B","খ) A+B = B+A","গ) A+A = 1","ঘ) A+AB = A"],"ans":"খ) A+B = B+A","logic":"A+B = B+A হলো বুলিয়ান অ্যালজেবরার বিনিময় (Commutative) উপপাদ্য। A+AB=A হলো শোষণ উপপাদ্য।","trick":"যোগের ক্ষেত্রে স্থান বিনিময় করলে মানের পরিবর্তন হয় না।"},{"category":"tab-2","id":"q35","tags":["FS","ঢা. বো. ১৯"],"q":"নিচের লজিক সার্কিটের আউটপুট Y=?<br><svg width='110' height='50' style='margin-top:10px;'><path d='M 15,10 C 25,25 15,40 15,40' fill='none' stroke='currentColor' stroke-width='2'/><path d='M 25,10 C 25,10 50,10 65,25 C 50,40 25,40 25,40 C 35,25 25,10 25,10 Z' fill='none' stroke='currentColor' stroke-width='2'/><circle cx='70' cy='25' r='5' fill='none' stroke='currentColor' stroke-width='2'/><line x1='0' y1='17' x2='17' y2='17' stroke='currentColor' stroke-width='2'/><line x1='0' y1='33' x2='17' y2='33' stroke='currentColor' stroke-width='2'/><line x1='75' y1='25' x2='100' y2='25' stroke='currentColor' stroke-width='2'/></svg>","opt":["ক) A'B'","খ) AB + A'B'","গ) AB' + A'B","ঘ) A+B"],"ans":"খ) AB + A'B'","logic":"চিত্রটি X-NOR গেটের। এর আউটপুট Y = A ⊙ B = AB + A'B'।","trick":"X-OR এর সামনে বাবল থাকলে তা X-NOR হয়ে যায়।"},{"category":"tab-2","id":"q36","tags":["FS"],"q":"Inverter হিসেবে কাজ করে কোনটি?","opt":["ক) AND","খ) NAND","গ) NOR","ঘ) NOT"],"ans":"ঘ) NOT","logic":"NOT গেট ইনপুটকে উল্টে দেয় (0 থাকলে 1, 1 থাকলে 0), তাই একে Inverter বলা হয়।","trick":"যা দেওয়া হয় তার উল্টোটা (Invert) করে NOT।"},{"category":"tab-3","id":"q37","tags":["FS","ঢা. বো. ১৯"],"q":"পাঁচটি ইনপুটবিশিষ্ট ডিকোডারের আউটপুট লাইন কতটি?","opt":["ক) ৮","খ) ১৬","গ) ৩২","ঘ) ৬৪"],"ans":"গ) ৩২","logic":"ডিকোডারের n টি ইনপুটের জন্য 2^n টি আউটপুট থাকে। 5 ইনপুটের জন্য 2^5 = 32 টি আউটপুট।","trick":"ডিকোডারে 2^n সূত্র মনে রাখুন।"},{"category":"tab-3","id":"q38","tags":["FS","কু. বো. ১১"],"q":"কোন ডিজিটাল বর্তনী n সংখ্যক ইনপুটের জন্য 2^n সংখ্যক আউটপুট প্রদান করে?","opt":["ক) এনকোডার","খ) ডিকোডার","গ) হাফ-অ্যাডার","ঘ) ফুল-অ্যাডার"],"ans":"খ) ডিকোডার","logic":"ডিকোডার কম্পিউটারের বোধগম্য ভাষাকে মানুষের বোধগম্য ভাষায় রূপান্তর করে, যেখানে n ইনপুট এবং 2^n আউটপুট থাকে।","trick":"কম থেকে বেশি লাইন হলে ডিকোডার।"},{"category":"tab-3","id":"q39","tags":["FS","য. বো. ১৯"],"q":"কোন বর্তনীতে 2^n সংখ্যক ইনপুট এবং n সংখ্যক আউটপুট থাকে?","opt":["ক) ডিকোডার","খ) রেজিস্টার","গ) এনকোডার","ঘ) কাউন্টার"],"ans":"গ) এনকোডার","logic":"এনকোডার মানুষের ভাষাকে কম্পিউটারের ভাষায় রূপান্তর করে, এটি ডিকোডারের ঠিক বিপরীত।","trick":"বেশি থেকে কম লাইন হলে এনকোডার।"},{"category":"tab-3","id":"q40","tags":["FS"],"q":"হাফ-অ্যাডারে (Half Adder) ক্যারি (C) এর সমীকরণ কোনটি?","opt":["ক) A+B","খ) A.B","গ) A⊕B","ঘ) (A.B)'"],"ans":"খ) A.B","logic":"হাফ-অ্যাডারে দুটি বিট যোগ করা হয়। Sum (S) = A⊕B এবং Carry (C) = A.B (AND গেট)।","trick":"যোগফলে XOR, আর ক্যারিতে AND।"},{"category":"tab-3","id":"q41","tags":["LM"],"q":"ফুল-অ্যাডারে (Full Adder) কয়টি ইনপুট থাকে?","opt":["ক) ১টি","খ) ২টি","গ) ৩টি","ঘ) ৪টি"],"ans":"গ) ৩টি","logic":"ফুল-অ্যাডারে দুটি বিট (A, B) এবং পূর্বের ক্যারি (Cin) সহ মোট ৩টি ইনপুট থাকে।","trick":"ফুল মানে পূর্ণ (বেশি), তাই ৩টি ইনপুট।"},{"category":"tab-3","id":"q42","tags":["FM"],"q":"কয়টি হাফ-অ্যাডার দিয়ে একটি ফুল-অ্যাডার বাস্তবায়ন করা যায়?","opt":["ক) ১টি","খ) ২টি","গ) ৩টি","ঘ) ৪টি"],"ans":"খ) ২টি","logic":"দুটি হাফ-অ্যাডার এবং একটি OR গেট ব্যবহার করে একটি ফুল-অ্যাডার তৈরি করা যায়।","trick":"1 Full = 2 Half."},{"category":"tab-3","id":"q43","tags":["FS"],"q":"উপাত্ত ও তথ্য সংরক্ষণের সাথে জড়িত- i) ফ্লিপ-ফ্লপ ii) অ্যাডার iii) রেজিস্টার","opt":["ক) i ও ii","খ) ii ও iii","গ) i ও iii","ঘ) i, ii ও iii"],"ans":"গ) i ও iii","logic":"ফ্লিপ-ফ্লপ 1 বিট ডেটা সংরক্ষণ করে। একাধিক ফ্লিপ-ফ্লপের সমন্বয়ে রেজিস্টার তৈরি হয় যা বেশি ডেটা সংরক্ষণ করে। অ্যাডার শুধু যোগ করে।","trick":"মেমোরি বা সংরক্ষণের কাজ করে ফ্লিপ-ফ্লপ ও রেজিস্টার।"},{"category":"tab-3","id":"q44","tags":["LM"],"q":"ডিকোডারের কাজ কী?","opt":["ক) বাইনারি যোগ করা","খ) মানুষের ভাষাকে কম্পিউটারের ভাষায় রূপান্তর","গ) কম্পিউটারের ভাষাকে মানুষের ভাষায় রূপান্তর","ঘ) ডেটা সংরক্ষণ করা"],"ans":"গ) কম্পিউটারের ভাষাকে মানুষের ভাষায় রূপান্তর","logic":"ডিকোডার (Decoder) হলো এমন একটি লজিক সার্কিট যা বাইনারি কোডকে ডেসিমেল বা অন্য বোধগম্য কোডে ডিকোড করে।","trick":"মেশিন কোড ডিকোড (উদ্ধার) করে মানুষের কাছে দেয়।"}];

        // ==========================================
        // ⚙️ ZERO-LAG CORE LOGIC
        // ==========================================

        document.getElementById('pageTitle').textContent = CONFIG.title;
        document.getElementById('pageSubtitle').textContent = CONFIG.subtitle;
        document.getElementById('totalCount').textContent = dataset.length;

        let trackingList = JSON.parse(localStorage.getItem(CONFIG.storageKey)) || [];

        // 1. Setup Tabs
        const tabContainer = document.getElementById('tabContainer');
        CONFIG.tabs.forEach((tab, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
            btn.textContent = tab.label;
            btn.onclick = (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderMCQs(tab.id); // Triggers lag-free render
            };
            tabContainer.appendChild(btn);
        });

        // 2. Optimized Rendering (Zero Lag for 300+ items)
        function renderMCQs(tabId) {
            const container = document.getElementById('mcqContainer');
            container.innerHTML = ''; // Clear current view
            
            // DocumentFragment prevents multiple reflows/lags
            const fragment = document.createDocumentFragment();
            const filteredData = dataset.filter(q => q.category === tabId);
            
            filteredData.forEach((item, index) => {
                const isChecked = trackingList.includes(item.id);
                const card = document.createElement('div');
                card.className = 'mcq-card ' + (isChecked ? 'completed' : '');
                
                let tagsHtml = item.tags ? item.tags.map(t => `<span class="tag">${t}</span>`).join('') : '';
                let optsHtml = item.opt.map(o => `<div class="opt-item">${o}</div>`).join('');
                
                let logicHtml = item.logic ? `<div style="margin-bottom:8px;"><span class="expl-title logic-text">লজিক:</span>${item.logic}</div>` : '';
                let trickHtml = item.trick ? `<div><span class="expl-title trick-text">ট্রিক:</span>${item.trick}</div>` : '';

                card.innerHTML = `
                    <div class="card-top">
                        <span class="q-badge">Q-${item.id.replace('q','').replace('_er','').replace('_1','')}</span>
                        <div>${tagsHtml}</div>
                    </div>
                    <div class="question">${item.q}</div>
                    <div class="options-group">${optsHtml}</div>
                    <div class="ans-reveal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <span>${item.ans}</span>
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="toggleAnalysis(this)">বিস্তারিত</button>
                        <button class="btn btn-primary" onclick="toggleRead('${item.id}', this, this.closest('.mcq-card'))">
                            ${isChecked ? 'সম্পন্ন' : 'পড়া শেষ'}
                        </button>
                        <div class="explanation">${logicHtml}${trickHtml}</div>
                    </div>
                `;
                fragment.appendChild(card);
            });
            
            container.appendChild(fragment); // Render everything instantly
            updateProgress();
        }

        // Action Handlers
        window.toggleAnalysis = function(btn) {
            const pnl = btn.parentElement.querySelector('.explanation');
            pnl.classList.toggle('show');
            btn.textContent = pnl.classList.contains('show') ? 'লুকান' : 'বিস্তারিত';
        };

        window.toggleRead = function(id, btnElement, cardElement) {
            if (!trackingList.includes(id)) {
                trackingList.push(id);
                cardElement.classList.add('completed');
                btnElement.textContent = 'সম্পন্ন';
            } else {
                trackingList = trackingList.filter(item => item !== id);
                cardElement.classList.remove('completed');
                btnElement.textContent = 'পড়া শেষ';
            }
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(trackingList));
            updateProgress();
        };

        function updateProgress() {
            const percent = dataset.length === 0 ? 0 : (trackingList.length / dataset.length) * 100;
            document.getElementById('barFill').style.width = percent + '%';
            document.getElementById('readCount').textContent = trackingList.length;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('পড়ার রেকর্ড মুছতে চান?')) {
                localStorage.removeItem(CONFIG.storageKey);
                trackingList = [];
                const activeTab = document.querySelector('.tab-btn.active');
                renderMCQs(CONFIG.tabs.find(t => t.label === activeTab.textContent).id);
            }
        });
        
        document.getElementById('chapterNav').addEventListener('change', (e) => {
            if(e.target.value) {
                window.location.href = '/chapter' + e.target.value + '.html';
            }
        });

        // Theme Toggle with Premium SVGs
        const themeBtn = document.getElementById('themeBtn');
        const rootHtml = document.documentElement;
        const savedTheme = localStorage.getItem('ict_theme_mutu') || 'light';
        
        const moonIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        const sunIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;

        const applyTheme = (theme) => {
            rootHtml.setAttribute('data-theme', theme);
            themeBtn.innerHTML = theme === 'light' ? moonIcon : sunIcon;
            localStorage.setItem('ict_theme_mutu', theme);
        };
        applyTheme(savedTheme);

        themeBtn.addEventListener('click', () => {
            const newTheme = rootHtml.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            applyTheme(newTheme);
        });

        // Initialize First Tab
        if(CONFIG.tabs.length > 0) renderMCQs(CONFIG.tabs[0].id);

    </script>
